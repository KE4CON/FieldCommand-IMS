<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICS Form — FieldCommand IMS</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.min.css">
<style>
/* Map picker modal */
.map-picker-modal {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:500; align-items:center; justify-content:center;
}
.map-picker-modal.open { display:flex; }
.map-picker-box {
  background:var(--panel); border:1px solid var(--eoc); border-radius:10px;
  width:92vw; max-width:1100px; height:88vh; display:flex; flex-direction:column;
}
.map-picker-toolbar {
  padding:10px 14px; border-bottom:1px solid var(--line);
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex-shrink:0;
}
.map-picker-toolbar .tool-group {
  display:flex; gap:4px; align-items:center;
}
.map-picker-toolbar .tool-sep {
  width:1px; height:20px; background:var(--line); margin:0 4px;
}
#mapPickerContainer { flex:1; position:relative; }
#mapPickerLeaflet { width:100%; height:100%; }
.map-picker-footer {
  padding:10px 14px; border-top:1px solid var(--line);
  display:flex; gap:8px; align-items:center; flex-shrink:0;
}
.annotation-label {
  font-size:10px; font-weight:bold; color:#fff;
  background:rgba(0,0,0,0.6); padding:2px 5px; border-radius:3px;
  white-space:nowrap;
}
</style>
<style>
.form-header {
  background: linear-gradient(135deg,#001428,#002858);
  border-bottom: 2px solid var(--eoc); padding: 10px 16px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.form-badge {
  background: var(--eoc); color: #fff; font-family: var(--font-hd);
  font-size: 12px; padding: 4px 12px; border-radius: 4px; letter-spacing: 2px;
}
.variant-pills { display: flex; gap: 4px; }
.variant-pill {
  padding: 3px 10px; border-radius: 10px; font-size: 11px;
  border: 1px solid var(--line); cursor: pointer; font-family: var(--font-hd);
}
.variant-pill.sel { background: var(--eoc); border-color: var(--eoc); color: #fff; }
.form-wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
.section-card {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; padding: 18px; margin-bottom: 14px;
}
.section-card h2 {
  font-family: var(--font-hd); font-size: 11px; letter-spacing: 2px;
  color: var(--eoc); margin: 0 0 14px; display: flex; align-items: center; gap: 10px;
}
.section-card h2::after { content:''; flex:1; height:1px; background:var(--line); }
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.fg label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.fg input, .fg select, .fg textarea {
  background: var(--input-bg); border: 1px solid var(--line);
  border-radius: 4px; color: var(--txt); padding: 7px 10px;
  font-size: 13px; width: 100%; box-sizing: border-box;
}
.fg textarea { resize: vertical; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--eoc); outline:none; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.full { grid-column: 1/-1; }
/* ── Image/Photo insert component ─────────────────────────────── */
.img-drop-zone {
  border: 2px dashed var(--line); border-radius: 8px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--bg); min-height: 80px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px;
}
.img-drop-zone:hover, .img-drop-zone.dragover {
  border-color: var(--eoc); background: rgba(26,58,107,0.08);
}
.img-drop-zone.has-image { border-style: solid; border-color: var(--green); padding: 8px; }
.img-drop-zone img { max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 4px; }
.img-drop-zone .drop-hint { font-size: 12px; color: var(--muted); }
.img-drop-zone .drop-icon { font-size: 28px; }
.img-toolbar {
  display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
}
.img-toolbar button { font-size: 11px; padding: 3px 10px; }
.img-caption { width: 100%; box-sizing: border-box; margin-top: 6px;
  background: var(--input-bg); border: 1px solid var(--line);
  border-radius: 4px; color: var(--txt); padding: 5px 8px; font-size: 12px;
}
.action-bar {
  position: sticky; bottom: 0; background: var(--panel);
  border-top: 1px solid var(--line); padding: 10px 16px;
  display: flex; gap: 8px; align-items: center; z-index: 10;
}
.save-indicator {
  font-size: 11px; color: var(--green); display: none;
}
/* ICS Print Form */
.ics-print {
  display: none; background: #fff; color: #000;
  font-family: Arial, sans-serif; font-size: 11px;
  border: 1px solid #000; margin: 16px;
}
.ics-print.show { display: block; }
.ics-print-header {
  display: flex; border-bottom: 2px solid #000;
}
.ics-print-header .logo-cell {
  width: 80px; border-right: 1px solid #000; padding: 6px;
  display: flex; align-items: center; justify-content: center;
}
.ics-print-header .logo-cell img { max-width: 70px; max-height: 60px; object-fit: contain; }
.ics-print-header .title-cell { flex: 1; padding: 8px 12px; text-align: center; }
.ics-print-header .title-cell h1 { font-size: 16px; font-weight: bold; margin: 0 0 3px; }
.ics-print-header .title-cell .sub { font-size: 11px; color: #444; }
.ics-print-header .meta-cell {
  border-left: 1px solid #000; padding: 6px 10px; min-width: 140px;
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
}
.ics-print-header .meta-cell .ml { font-size: 9px; text-transform: uppercase; color: #666; }
.ics-print-header .meta-cell .mv { font-size: 12px; font-weight: bold; }
.pr { display: flex; border-bottom: 1px solid #000; }
.pr:last-child { border-bottom: none; }
.pc { padding: 5px 8px; border-right: 1px solid #000; flex: 1; }
.pc:last-child { border-right: none; }
.pc .pl { font-size: 9px; text-transform: uppercase; color: #555; margin-bottom: 2px; }
.pc .pv { font-size: 11px; min-height: 16px; white-space: pre-wrap; }
.pc .pw { min-height: 60px; }
.pc.w2 { flex: 2; }
.pc.w3 { flex: 3; }
.pc.w4 { flex: 4; }
.sig-row { display: flex; min-height: 50px; border-top: 1px solid #000; }
.sig-cell { flex: 1; padding: 5px 8px; border-right: 1px solid #000; }
.sig-cell:last-child { border-right: none; }
.sig-cell .sl { font-size: 9px; text-transform: uppercase; color: #555; }
.sig-cell .ss { border-bottom: 1px solid #000; margin: 12px 0 4px; min-height: 18px; }
.print-footer { border-top: 1px solid #000; padding: 4px 8px; font-size: 8px; color: #666; display: flex; justify-content: space-between; }
@media print {
  .form-header,.action-bar,.form-wrap { display: none !important; }
  .ics-print { display: block !important; margin: 0; border: none; }
}
</style>
</head>
<body>

<div class="form-header">
  <span class="form-badge" id="formBadge">ICS</span>
  <span style="font-family:var(--font-hd);font-size:14px;letter-spacing:2px" id="formTitle">ICS Form</span>
  <div style="display:flex;flex-direction:column;gap:2px;margin-left:8px">
    <div style="font-size:10px;color:var(--muted)">Form Variant</div>
    <div class="variant-pills" id="variantPills">
      <div class="variant-pill sel" onclick="setVariant('FEMA')">FEMA</div>
      <div class="variant-pill" onclick="setVariant('USCG')">USCG</div>
      <div class="variant-pill" onclick="setVariant('NWCG')">NWCG</div>
    </div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button onclick="saveForm()"
      style="background:var(--eoc);border-color:var(--eoc);color:#fff;font-weight:bold">
      💾 Save
    </button>
    <button onclick="printForm()">🖨 Print</button>
    <a id="backLink" href="incident.html" style="color:var(--muted);font-size:12px">← Incident</a>
  </div>
</div>

<div class="form-wrap" id="formWrap">
  <div style="color:var(--muted);text-align:center;padding:40px">Loading form...</div>
</div>

<div class="action-bar">
  <button onclick="saveForm()"
    style="background:var(--eoc);border-color:var(--eoc);color:#fff;font-weight:bold;padding:8px 24px">
    💾 Save Form
  </button>
  <button onclick="printForm()" style="padding:8px 16px">🖨 Print / Export</button>
  <span class="save-indicator" id="saveIndicator">✓ Saved</span>
  <div style="margin-left:auto;font-size:11px;color:var(--dim)" id="formMeta"></div>
</div>

<!-- Print view (hidden until print) -->
<div class="ics-print" id="printView"></div>

<script>
const ICS_API  = 'http://192.168.50.1:5051';
const MAIN_API = 'http://192.168.50.1:5050';

const params    = new URLSearchParams(location.search);
const FORM_NUM  = params.get('form') || '201';
const INC_ID    = params.get('incident') || '';
const PERIOD    = parseInt(params.get('period') || '1');
let   VARIANT   = 'FEMA';
let   incData   = {};
let   orgData   = {};
let   savedId   = null;

// ── Load org and incident context ─────────────────────────────────────
async function loadContext() {
  try {
    const [orgR, incR] = await Promise.all([
      fetch(`${MAIN_API}/api/config`),
      INC_ID ? fetch(`${ICS_API}/api/ics/incidents/${INC_ID}`) : Promise.resolve(null)
    ]);
    orgData = orgR.ok ? await orgR.json() : {};
    if (incR?.ok) {
      const d = await incR.json();
      incData = d.incident || d;
    }
    VARIANT = incData.ics_variant || orgData.ics_form_variant || 'FEMA';
    setVariant(VARIANT, false);
    if (INC_ID) {
      document.getElementById('backLink').href = `incident.html?incident=${INC_ID}`;
    }
    // Try to load existing saved form
    await loadSavedForm();
    // Render the form
    renderForm();
  } catch(e) {
    console.error('Context load failed', e);
    renderForm();
  }
}

async function loadSavedForm() {
  if (!INC_ID) return;
  try {
    const r = await fetch(
      `${ICS_API}/api/ics/forms/ics${FORM_NUM}?incident_id=${INC_ID}&period=${PERIOD}`);
    const forms = await r.json();
    if (forms.length) {
      savedId = forms[0].id;
      const data = JSON.parse(forms[0].data || '{}');
      // Merge saved data into formData
      Object.assign(formData, data);
    }
  } catch(e) {}
}

function setVariant(v, rerender=true) {
  VARIANT = v;
  document.querySelectorAll('.variant-pill').forEach(el => {
    el.classList.toggle('sel', el.textContent === v);
  });
  if (rerender && document.getElementById('formWrap').children.length) renderForm();
}

// ── Form data store ────────────────────────────────────────────────────
let formData = {};

function val(key, def='') {
  return formData[key] ?? incData[key] ?? orgData[key] ?? def;
}
function now() { return new Date().toISOString().slice(0,16); }
function todayDate() { return new Date().toISOString().slice(0,10); }

// ── Collect all form field values ─────────────────────────────────────
function collectFormData() {
  const data = {};
  document.querySelectorAll('[data-key]').forEach(el => {
    data[el.dataset.key] = el.value || el.textContent || '';
  });
  return data;
}

// ── Save form ──────────────────────────────────────────────────────────
async function saveForm() {
  const data = collectFormData();
  data.form_type = `ics${FORM_NUM}`;
  data.variant = VARIANT;
  data.period = PERIOD;
  data.incident_id = INC_ID;
  data.updated = new Date().toISOString();

  const payload = {
    id: savedId,
    incident_id: INC_ID,
    period: PERIOD,
    summary: data.incident_name || incData.name || `ICS-${FORM_NUM}`,
    data: JSON.stringify(data),
  };

  try {
    const r = await fetch(`${ICS_API}/api/ics/forms/ics${FORM_NUM}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const result = await r.json();
    if (result.ok) {
      savedId = result.id || savedId;
      const ind = document.getElementById('saveIndicator');
      ind.style.display = 'inline';
      setTimeout(() => ind.style.display = 'none', 3000);
      Object.assign(formData, data);
    }
  } catch(e) {
    // Offline — save to localStorage
    localStorage.setItem(`ics${FORM_NUM}-${INC_ID}-${PERIOD}`, JSON.stringify(data));
    const ind = document.getElementById('saveIndicator');
    ind.textContent = '✓ Saved locally';
    ind.style.display = 'inline';
    setTimeout(() => { ind.style.display='none'; ind.textContent='✓ Saved'; }, 3000);
  }
}

// ── Print form ─────────────────────────────────────────────────────────
function printForm() {
  collectFormData(); // ensure latest
  buildPrintView();
  window.print();
}

// ── Image field helper ────────────────────────────────────────────────
function imageField(key, label, hint='') {
  return `<div class="fg">
    <label>${label}${hint ? `<span style="font-weight:normal;color:var(--dim);margin-left:6px">${hint}</span>` : ''}</label>
    <div class="img-drop-zone" id="imgZone_${key}"
      onclick="document.getElementById('imgFile_${key}').click()"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleImgDrop(event,'${key}')">
      <span class="drop-icon">🖼</span>
      <span class="drop-hint">Click to upload or drag & drop<br>PNG · JPG · GIF · SVG · PDF page</span>
    </div>
    <input type="file" id="imgFile_${key}" accept="image/*,application/pdf"
      style="display:none" onchange="handleImgUpload(event,'${key}')">
    <div class="img-toolbar" id="imgToolbar_${key}" style="display:none">
      <button onclick="rotateImg('${key}',-90)">↺ Rotate L</button>
      <button onclick="rotateImg('${key}',90)">↻ Rotate R</button>
      <button onclick="clearImg('${key}')" style="background:var(--panel2)">✕ Remove</button>
    </div>
    <input type="text" class="img-caption" id="imgCaption_${key}"
      data-key="${key}_caption" placeholder="Caption / description (optional)"
      style="display:none">
    <input type="hidden" id="imgData_${key}" data-key="${key}_img">
  </div>`;
}

// Image handling functions
function handleImgUpload(event, key) {
  const file = event.target.files[0];
  if (!file) return;
  readImgFile(file, key);
}
function handleImgDrop(event, key) {
  event.preventDefault();
  document.getElementById('imgZone_'+key)?.classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) readImgFile(file, key);
}
function readImgFile(file, key) {
  if (file.size > 10 * 1024 * 1024) { alert('Image must be under 10 MB'); return; }
  const reader = new FileReader();
  reader.onload = e => setImg(key, e.target.result, file.name);
  reader.readAsDataURL(file);
}
function setImg(key, dataUrl, name='') {
  const zone    = document.getElementById('imgZone_'+key);
  const toolbar = document.getElementById('imgToolbar_'+key);
  const caption = document.getElementById('imgCaption_'+key);
  const hidden  = document.getElementById('imgData_'+key);
  if (!zone) return;
  zone.innerHTML = `<img id="imgEl_${key}" src="${dataUrl}" alt="${name}">`;
  zone.classList.add('has-image');
  toolbar.style.display = 'flex';
  caption.style.display = 'block';
  hidden.value = dataUrl;
  formData[key+'_img'] = dataUrl;
  formData[key+'_name'] = name;
}
function clearImg(key) {
  const zone    = document.getElementById('imgZone_'+key);
  const toolbar = document.getElementById('imgToolbar_'+key);
  const caption = document.getElementById('imgCaption_'+key);
  const hidden  = document.getElementById('imgData_'+key);
  const fileEl  = document.getElementById('imgFile_'+key);
  zone.innerHTML = '<span class="drop-icon">🖼</span><span class="drop-hint">Click to upload or drag & drop<br>PNG · JPG · GIF · SVG</span>';
  zone.classList.remove('has-image');
  toolbar.style.display = 'none';
  caption.style.display = 'none';
  hidden.value = '';
  if (fileEl) fileEl.value = '';
  delete formData[key+'_img'];
}
let imgRotations = {};
function rotateImg(key, deg) {
  imgRotations[key] = ((imgRotations[key]||0) + deg + 360) % 360;
  const el = document.getElementById('imgEl_'+key);
  if (el) el.style.transform = `rotate(${imgRotations[key]}deg)`;
}
// Restore saved images on form load
function restoreImages() {
  Object.keys(formData).forEach(k => {
    if (k.endsWith('_img') && formData[k]) {
      const key = k.replace('_img','');
      setImg(key, formData[k], formData[key+'_name']||'');
      const caption = document.getElementById('imgCaption_'+key);
      if (caption && formData[key+'_caption']) caption.value = formData[key+'_caption'];
    }
  });
}

// ── Field helper ───────────────────────────────────────────────────────
function field(key, label, type='text', placeholder='', opts={}) {
  const v = val(key);
  const tag = type === 'textarea' ? 'textarea' : 'input';
  const rows = opts.rows || 3;
  const inner = type === 'textarea'
    ? `<textarea data-key="${key}" rows="${rows}" placeholder="${placeholder}">${v}</textarea>`
    : `<input type="${type}" data-key="${key}" value="${v}" placeholder="${placeholder}">`;
  return `<div class="fg"><label>${label}</label>${inner}</div>`;
}

function select(key, label, options, def='') {
  const v = val(key, def);
  const opts = options.map(o =>
    `<option ${o===v?'selected':''}>${o}</option>`).join('');
  return `<div class="fg"><label>${label}</label><select data-key="${key}">${opts}</select></div>`;
}

// ── Logo helper ─────────────────────────────────────────────────────────
function logoHtml() {
  if (orgData.logo_data && orgData.logo_mime) {
    return `<img src="data:${orgData.logo_mime};base64,${orgData.logo_data}" style="max-width:70px;max-height:60px;object-fit:contain">`;
  }
  return `<div style="font-family:var(--font-hd);font-size:9px;color:#888;text-align:center">
    ${orgData.org_short || orgData.callsign || 'ICS'}</div>`;
}

// ── Print cell builder ─────────────────────────────────────────────────
function pc(label, key, cls='', tall=false) {
  const v = formData[key] || incData[key] || orgData[key] || '';
  return `<div class="pc ${cls}"><div class="pl">${label}</div><div class="pv ${tall?'pw':''}">${v}</div></div>`;
}

// ── FORM RENDERERS ─────────────────────────────────────────────────────
const FORMS = {};

// ══════════════════════════════════════════════════════════════════
// ICS-201 INCIDENT BRIEFING
// ══════════════════════════════════════════════════════════════════
FORMS['201'] = {
  title: 'ICS-201 Incident Briefing',
  badge: 'ICS-201',
  variants: {
    FEMA: 'FEMA 010-0-1',
    USCG: 'CG-5210',
    NWCG: 'ICS-201 (NWCG)'
  },
  render() {
    document.getElementById('formTitle').textContent = 'ICS-201 — Incident Briefing';
    document.getElementById('formBadge').textContent = 'ICS-201';
    document.getElementById('formMeta').textContent =
      `${this.variants[VARIANT]} · Period ${PERIOD} · ${INC_ID ? incData.name : 'No incident'}`;

    return `
    <div class="section-card">
      <h2>1. Incident Information</h2>
      <div class="grid-3">
        ${field('incident_name','Incident Name','text',incData.name||'')}
        ${field('incident_number','Incident Number','text','')}
        ${select('incident_type','Incident Type',[
          'Wildfire','Flood','Earthquake','Winter Storm','Tornado','Hurricane',
          'Hazmat','Mass Casualty','Search and Rescue','Planned Event',
          'EOC Activation','Drill / Exercise','Other'
        ],incData.type||'')}
      </div>
      <div class="grid-3">
        ${field('date','Date','date',todayDate())}
        ${field('time_prepared','Time Prepared','time',new Date().toTimeString().slice(0,5))}
        ${field('map_sketch_page','Map / Sketch Page','')}
      </div>
      <div class="grid-2">
        ${field('incident_location','Incident Location / Address','text',incData.location||'')}
        ${field('jurisdiction','Jurisdiction','text',incData.jurisdiction||orgData.county+', '+orgData.state||'')}
      </div>
    </div>

    <div class="section-card">
      <h2>2. Incident Commander & Staff</h2>
      <div class="grid-2">
        ${field('incident_commander','Incident Commander (IC)','text',incData.incident_commander||'')}
        ${field('deputy_ic','Deputy IC','')}
      </div>
      <div class="grid-3">
        ${field('safety_officer','Safety Officer (SO)','')}
        ${field('public_info_officer','Public Information Officer (PIO)','')}
        ${field('liaison_officer','Liaison Officer (LO)','')}
      </div>
      <div class="grid-2">
        ${field('prepared_by','Prepared By (name/position)','text',orgData.personal_call||'')}
        ${field('agency','Agency / Organization','text',
          orgData.org_short ? `${orgData.org_name} (${orgData.org_short})` : orgData.org_name||'')}
      </div>
    </div>

    <div class="section-card">
      <h2>3. Situation Summary / Health & Safety Briefing</h2>
      ${field('situation_summary','Current Situation Summary','textarea','Describe the current incident situation, size, behavior, and significant factors...',{rows:5})}
      ${field('health_safety','Health & Safety Briefing / Hazards','textarea','Known hazards, PPE requirements, medical concerns...',{rows:3})}
    </div>

    <div class="section-card">
      <h2>4. Current & Planned Objectives</h2>
      ${field('current_objectives','Current Objectives','textarea','List current incident objectives (will transfer to ICS-202)...',{rows:4})}
      ${field('current_actions','Current Actions / Resources Assigned','textarea','What actions are currently being taken?',{rows:3})}
    </div>

    <div class="section-card">
      <h2>5. Current Organization</h2>
      <div class="grid-3">
        ${field('ops_section_chief','Operations Section Chief','')}
        ${field('planning_section_chief','Planning Section Chief','')}
        ${field('logistics_section_chief','Logistics Section Chief','')}
      </div>
      <div class="grid-3">
        ${field('finance_section_chief','Finance / Admin Section Chief','')}
        ${field('air_ops_branch','Air Operations Branch Director','')}
        ${field('staging_area_mgr','Staging Area Manager','')}
      </div>
    </div>

    <div class="section-card">
      <h2>6. Resources Summary</h2>

function renderForm() {
  const def = FORMS[FORM_NUM];
  if (!def) {
    document.getElementById('formWrap').innerHTML =
      `<div style="color:var(--muted);text-align:center;padding:40px">
        <div style="font-size:32px;margin-bottom:12px">🚧</div>

        </div>
        <a href="incident.html?incident=${INC_ID}" style="display:inline-block;margin-top:16px;color:var(--blue)">
          ← Back to Incident
        </a>
      </div>`;
    return;
  }
  document.title = `${def.title} — FieldCommand IMS`;
  document.getElementById('formWrap').innerHTML = def.render();
  // Restore saved values
  Object.entries(formData).forEach(([k,v]) => {
    const el = document.querySelector(`[data-key="${k}"]`);
    if (el) el.value = v;
  });
  // Restore any saved images
  restoreImages();
}

function buildPrintView() {
  const def = FORMS[FORM_NUM];
  if (!def?.buildPrint) return;
  const pv = document.getElementById('printView');
  pv.innerHTML = def.buildPrint();
  pv.classList.add('show');
}

// ICS-202 objectives state
let state202 = { objectives: [] };

function prefillObjective(val) {
  if (!val) return;
  document.getElementById('newObjText').value = val;
  document.getElementById('commonObjSel').value = '';
  document.getElementById('newObjText').focus();
}

function addObjective202() {
  const txt = document.getElementById('newObjText').value.trim();
  if (!txt) return;
  state202.objectives.push(txt);
  document.getElementById('newObjText').value = '';
  renderObjectives202();
}

function removeObjective202(i) {
  state202.objectives.splice(i, 1);
  renderObjectives202();
}

function moveObjective202(i, dir) {
  const arr = state202.objectives;
  const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  renderObjectives202();
}

function renderObjectives202() {
  const el = document.getElementById('objList202');
  if (!el) return;
  if (!state202.objectives.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">No objectives added yet.</div>';
    return;
  }
  el.innerHTML = state202.objectives.map((o,i) => `
    <div style="display:flex;gap:8px;align-items:flex-start;padding:8px;
                background:var(--panel2);border-radius:5px;margin-bottom:5px;border:1px solid var(--line)">
      <span style="font-family:var(--font-hd);font-size:13px;color:var(--amber);
                   min-width:24px;padding-top:2px">${i+1}.</span>
      <span style="flex:1;font-size:13px;line-height:1.5">${o}</span>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button onclick="moveObjective202(${i},-1)" title="Move up"
          style="font-size:11px;padding:2px 6px;background:var(--panel)">↑</button>
        <button onclick="moveObjective202(${i},1)" title="Move down"
          style="font-size:11px;padding:2px 6px;background:var(--panel)">↓</button>
        <button onclick="removeObjective202(${i})" title="Remove"
          style="font-size:11px;padding:2px 6px;background:var(--panel);color:var(--red)">✕</button>
      </div>
    </div>`).join('');
  // Store in formData for save
  formData['objectives_json'] = JSON.stringify(state202.objectives);
}

async function loadAssignments203() {
  if (!INC_ID) return;
  try {
    const r = await fetch(`${ICS_API}/api/ics/assignments?incident_id=${INC_ID}`);
    const data = await r.json();
    let populated = 0;

    // From check-in assignments (authoritative)
    (data.assignments || []).forEach(a => {
      const key = POSITION_MAP[a.ics_position];
      if (key && !formData[key]) {
        const display = a.name ? `${a.name} (${a.callsign})` : a.callsign;
        formData[key] = display;
        const el = document.querySelector(`[data-key="${key}"]`);
        if (el) { el.value = display; el.style.background='rgba(26,122,58,0.1)'; }
        populated++;
      }
    });

    // From roster roles (fallback for positions not yet checked in)
    (data.roster_roles || []).forEach(r => {
      const key = POSITION_MAP[r.role];
      if (key && !formData[key]) {
        const display = r.name ? `${r.name} (${r.callsign||r.radio_id||''})`.trim() : r.callsign||'';
        if (display) {
          formData[key] = display;
          const el = document.querySelector(`[data-key="${key}"]`);
          if (el) { el.value = display; el.style.background='rgba(26,58,107,0.1)'; }
          populated++;
        }
      }
    });

    formData._203_loaded = true;
    if (populated > 0) {
      const banner = document.createElement('div');
      banner.style.cssText = 'background:rgba(26,122,58,0.15);border:1px solid var(--green);border-radius:5px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:var(--green)';
      banner.innerHTML = `✓ Auto-populated ${populated} field${populated!==1?'s':''} from check-in assignments and roster. <span style="color:var(--amber)">(Green = from check-in · Blue = from roster)</span> Edit any field as needed.`;
      const wrap = document.getElementById('formWrap');
      if (wrap) wrap.prepend(banner);
    }
  } catch(e) {
    console.log('Assignment load failed (offline?):', e);
  }
}

let ch205Count = 12;

function add205Row() {
  const tbody = document.getElementById('ch205Body');
  if (!tbody) return;
  const tr = document.createElement('tr');
  const tmp = document.createElement('tbody');
  tmp.innerHTML = FORMS['205']._chRow(ch205Count++);
  tbody.appendChild(tmp.firstChild);
}

async function loadRepeatersFor205() {
  const statusEl = document.getElementById('repeaterImportStatus');
  statusEl.textContent = 'Loading repeaters...';
  statusEl.style.display = 'block';
  try {
    const r = await fetch(`${MAIN_API}/api/repeaters?limit=20`);
    const repeaters = await r.json();
    if (!repeaters.length) {
      statusEl.textContent = 'No repeaters in database. Go to Repeaters page to add some.';
      statusEl.style.color = 'var(--amber)';
      return;
    }
    // Show picker modal
    showRepeaterPicker(repeaters);
    statusEl.style.display = 'none';
  } catch(e) {
    statusEl.textContent = 'Could not load repeaters — API offline.';
    statusEl.style.color = 'var(--red)';
  }
}

function showRepeaterPicker(repeaters) {
  const existing = document.getElementById('repPickerModal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'repPickerModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--eoc);border-radius:10px;
                padding:20px;width:700px;max-width:96vw;max-height:80vh;display:flex;flex-direction:column">
      <div style="font-family:var(--font-hd);font-size:14px;color:var(--amber);margin-bottom:12px;letter-spacing:1px">
        📡 SELECT REPEATERS TO IMPORT
      </div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 10px">
        Select repeaters to add to the ICS-205 channel plan. Each selected repeater becomes one channel row.
      </p>
      <div style="overflow-y:auto;flex:1;border:1px solid var(--line);border-radius:6px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead style="position:sticky;top:0;background:var(--panel2)">
            <tr>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">✓</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">Callsign</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">Output Freq</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">Input Freq</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">Mode</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">Tone</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">City</th>
              <th style="padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)">Use</th>
            </tr>
          </thead>
          <tbody>
            ${repeaters.map((rep,i) => `
              <tr style="border-bottom:1px solid var(--line)" id="reprow_${i}">
                <td style="padding:5px 8px">
                  <input type="checkbox" id="repchk_${i}" value="${i}"
                    style="width:15px;height:15px">
                </td>
                <td style="padding:5px 8px;font-family:var(--font-hd)">${rep.callsign||''}</td>
                <td style="padding:5px 8px;font-family:monospace">${rep.output_freq||''}</td>
                <td style="padding:5px 8px;font-family:monospace">${rep.input_freq||''}</td>
                <td style="padding:5px 8px">${rep.mode||'FM'}</td>
                <td style="padding:5px 8px;font-family:monospace">${rep.tone||''}</td>
                <td style="padding:5px 8px">${rep.city||''}</td>
                <td style="padding:5px 8px">
                  <span style="font-size:10px;padding:1px 5px;border-radius:3px;
                    background:${rep.ares?'rgba(26,122,58,0.2)':'var(--bg)'};
                    border:1px solid ${rep.ares?'var(--green)':'var(--line)'};
                    color:${rep.ares?'var(--green)':'var(--dim)'}"
                  >${rep.ares?'ARES':rep.use_type||'Open'}</span>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
        <button onclick="selectAllRepeaters(${repeaters.length})"
          style="font-size:11px;padding:4px 10px">Select All ARES</button>
        <button onclick="importSelectedRepeaters(${JSON.stringify(repeaters).replace(/"/g,'&quot;')})"
          style="background:var(--eoc);border-color:var(--eoc);color:#fff;font-weight:bold;padding:7px 20px">
          Import Selected
        </button>
        <button onclick="document.getElementById('repPickerModal').remove()"
          style="background:var(--panel2)">Cancel</button>
        <span style="font-size:11px;color:var(--muted);margin-left:auto">
          ${repeaters.length} repeaters in database
        </span>
      </div>
    </div>`;
  document.body.appendChild(modal);
  // Store repeaters data
  modal._repeaters = repeaters;
}

function selectAllRepeaters(count) {
  for (let i=0; i<count; i++) {
    const chk = document.getElementById(`repchk_${i}`);
    const modal = document.getElementById('repPickerModal');
    if (chk && modal && modal._repeaters) {
      // Auto-select ARES repeaters
      if (modal._repeaters[i]?.ares) chk.checked = true;
    }
  }
}

function importSelectedRepeaters(repeaters) {
  const tbody = document.getElementById('ch205Body');
  if (!tbody) return;

  let imported = 0;
  repeaters.forEach((rep, i) => {
    const chk = document.getElementById(`repchk_${i}`);
    if (!chk?.checked) return;

    // Find first empty row or add new row
    let rowIdx = ch205Count;
    for (let r=0; r<ch205Count; r++) {
      const rxEl = document.querySelector(`[data-key="ch205_rx_${r}"]`);
      if (rxEl && !rxEl.value) { rowIdx = r; break; }
    }

    if (rowIdx === ch205Count) {
      // Need new row
      const tr = document.createElement('tr');
      const tmp = document.createElement('tbody');
      tmp.innerHTML = FORMS['205']._chRow(ch205Count);
      tbody.appendChild(tmp.firstChild);
      rowIdx = ch205Count++;
    }

    // Fill in the row
    const setField = (key, val) => {
      const el = document.querySelector(`[data-key="${key}"]`);
      if (el) el.value = val;
    };
    setField(`ch205_zone_${rowIdx}`, `${imported+1}`);
    setField(`ch205_name_${rowIdx}`, `${rep.callsign||''} ${rep.city?'('+rep.city+')':''}`);
    setField(`ch205_rx_${rowIdx}`, rep.output_freq||'');
    setField(`ch205_tx_${rowIdx}`, rep.input_freq||'');
    setField(`ch205_mode_${rowIdx}`, rep.mode||'FM');
    setField(`ch205_pl_${rowIdx}`, rep.tone||'');
    setField(`ch205_remarks_${rowIdx}`, rep.sponsor||rep.use_type||'');
    // Set assignment dropdown
    const assignEl = document.querySelector(`[data-key="ch205_assign_${rowIdx}"]`);
    if (assignEl) assignEl.value = rep.ares ? 'All' : 'Tactical';
    imported++;
  });

  document.getElementById('repPickerModal')?.remove();
  const statusEl = document.getElementById('repeaterImportStatus');
  if (statusEl) {
    statusEl.textContent = `✓ Imported ${imported} repeater${imported!==1?'s':''} into the channel plan.`;
    statusEl.style.display = 'block';
    statusEl.style.color = 'var(--green)';
  }
}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.min.js"></script>

<script>
// ── Map Picker ────────────────────────────────────────────────────────
let mpMap = null;
let mpDrawLayer = null;
let mpDrawControl = null;
let mpRadarLayer = null;
let mpCurrentColor = '#e63946';
let mpTargetKey = null;
let mpTileLayer = null;
let mpLabels = [];

const TILE_SERVER = 'http://localhost:8083';
const TILE_SOURCES = {
  offline_auto:   null, // handled by FC_TILES
  osm:            { url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'© OpenStreetMap contributors', crossOrigin:true },
  esri_sat:       { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'© Esri', crossOrigin:false },
  esri_topo:      { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', attr:'© Esri', crossOrigin:false },
  usgs_topo:      { url:`${TILE_SERVER}/tiles/usgs_topo/{z}/{x}/{y}.png`, attr:'USGS', crossOrigin:true },
  usgs_imagery:   { url:`${TILE_SERVER}/tiles/usgs_imagery/{z}/{x}/{y}.png`, attr:'USGS', crossOrigin:true },
  usgs_imgtopo:   { url:`${TILE_SERVER}/tiles/usgs_imgtopo/{z}/{x}/{y}.png`, attr:'USGS', crossOrigin:true },
};

function openMapPicker(key) {
  mpTargetKey = key;
  document.getElementById('mapPickerModal').classList.add('open');
  document.getElementById('mpCaption').value = formData[key+'_caption'] || '';

  // Initialize map on first open
  setTimeout(() => {
    if (!mpMap) {
      mpMap = L.map('mapPickerLeaflet', { preferCanvas: true });

      // Default view — use incident location or org coords
      const lat = parseFloat(orgData.lat) || 42.3247;
      const lon = parseFloat(orgData.lon) || -88.3822;
      mpMap.setView([lat, lon], 13);

      // Default tile layer
      mpSetTile('offline_auto');

      // Draw layer
      mpDrawLayer = new L.FeatureGroup();
      mpMap.addLayer(mpDrawLayer);

      // Draw control
      mpDrawControl = new L.Control.Draw({
        draw: {
          marker: { icon: L.divIcon({className:'', html:'<div style="font-size:20px">📍</div>'}) },
          polyline: { shapeOptions: { color: mpCurrentColor, weight: 3 } },
          polygon:  { shapeOptions: { color: mpCurrentColor, weight: 2, fillOpacity: 0.2 } },
          rectangle:{ shapeOptions: { color: mpCurrentColor, weight: 2, fillOpacity: 0.15 } },
          circle:   { shapeOptions: { color: mpCurrentColor, weight: 2, fillOpacity: 0.15 } },
          circlemarker: false,
        },
        edit: { featureGroup: mpDrawLayer }
      });
      mpMap.addControl(mpDrawControl);

      // Scale
      L.control.scale({ imperial: true, metric: true }).addTo(mpMap);

      // Handle drawn items
      mpMap.on(L.Draw.Event.CREATED, e => {
        const layer = e.layer;
        // Apply current color
        if (layer.setStyle) {
          layer.setStyle({ color: mpCurrentColor, fillColor: mpCurrentColor, fillOpacity: 0.2, weight: 3 });
        }
        // Add label if set
        const label = document.getElementById('mpLabel').value.trim();
        if (label && layer.bindTooltip) {
          layer.bindTooltip(label, { permanent: true, className:'annotation-label', direction:'center' });
        }
        mpDrawLayer.addLayer(layer);
      });
    } else {
      mpMap.invalidateSize();
    }
  }, 100);
}

function closeMapPicker() {
  document.getElementById('mapPickerModal').classList.remove('open');
}

function mpSetTile(source) {
  if (mpTileLayer) { mpMap.removeLayer(mpTileLayer); mpTileLayer = null; }
  if (source === 'offline_auto') {
    // Use FC_TILES auto detection
    FC_TILES.buildLayerControl(mpMap, {}).then(result => {
      mpTileLayer = result.baseLayer;
    }).catch(() => {
      // Fallback to OSM online
      mpTileLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:'© OpenStreetMap contributors', crossOrigin: true
      });
      mpTileLayer.addTo(mpMap);
    });
  } else {
    const s = TILE_SOURCES[source];
    if (s) {
      mpTileLayer = L.tileLayer(s.url, {
        attribution: s.attr,
        crossOrigin: s.crossOrigin ? 'anonymous' : false,
        maxZoom: 19
      });
      mpTileLayer.addTo(mpMap);
    }
  }
}

function mpSetColor(color) {
  mpCurrentColor = color;
  document.querySelectorAll('#mpColorBtns button').forEach(b => {
    b.style.border = b.style.background === color.replace('#','') ?
      '3px solid #fff' : '2px solid transparent';
  });
  // Update draw control options
  if (mpDrawControl) {
    mpDrawControl.setDrawingOptions({
      polyline:  { shapeOptions: { color, weight: 3 } },
      polygon:   { shapeOptions: { color, weight: 2, fillColor: color, fillOpacity: 0.2 } },
      rectangle: { shapeOptions: { color, weight: 2, fillColor: color, fillOpacity: 0.15 } },
      circle:    { shapeOptions: { color, weight: 2, fillColor: color, fillOpacity: 0.15 } },
    });
  }
}

function mpDraw(type) {
  if (!mpMap) return;
  // Programmatically activate draw tool
  const tools = mpDrawControl._toolbars.draw._modes;
  if (tools[type]) tools[type].handler.enable();
}

function mpAddLabel() {
  const txt = document.getElementById('mpLabel').value.trim();
  if (!txt || !mpMap) return;
  const center = mpMap.getCenter();
  const marker = L.marker(center, {
    icon: L.divIcon({
      className: '',
      html: `<div class="annotation-label">${txt}</div>`,
      iconAnchor: [0, 0]
    })
  });
  mpDrawLayer.addLayer(marker);
  mpLabels.push({text: txt, lat: center.lat, lng: center.lng});
  document.getElementById('mpLabel').value = '';
}

function mpClearAnnotations() {
  if (mpDrawLayer) mpDrawLayer.clearLayers();
  mpLabels = [];
}

function mpToggleRadar() {
  const on = document.getElementById('mpRadarToggle').checked;
  if (!mpMap) return;
  if (on) {
    // Iowa Mesonet NEXRAD (same as radar.html)
    mpRadarLayer = L.tileLayer(
      'https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png',
      { opacity: 0.6, attribution: 'Iowa State Mesonet' }
    );
    mpRadarLayer.addTo(mpMap);
  } else {
    if (mpRadarLayer) { mpMap.removeLayer(mpRadarLayer); mpRadarLayer = null; }
  }
}

function mpCapture() {
  if (!mpMap) return;
  const caption = document.getElementById('mpCaption').value.trim() || 'Map';
  const status = document.getElementById('mpStatus');
  status.textContent = '📷 Capturing map...';

  leafletImage(mpMap, (err, canvas) => {
    if (err) {
      // Fallback: try html2canvas approach or show error
      status.textContent = '⚠ Capture failed — try switching to offline tiles (CORS restriction on online tiles). ' + err;
      // Try canvas-based fallback
      mpCaptureFallback(caption);
      return;
    }
    const dataUrl = canvas.toDataURL('image/png');
    setImg(mpTargetKey, dataUrl, caption);
    // Also set caption
    const captEl = document.getElementById('imgCaption_' + mpTargetKey);
    if (captEl) captEl.value = caption;
    formData[mpTargetKey + '_caption'] = caption;
    closeMapPicker();
    status.textContent = 'Pan and zoom to your area of interest, add annotations, then click Capture.';
  });
}

function mpCaptureFallback(caption) {
  // When CORS blocks tile capture, capture just the draw layer as SVG
  // and offer it as an overlay on a blank canvas with coordinate info
  if (!mpMap) return;
  const bounds = mpMap.getBounds();
  const zoom   = mpMap.getZoom();
  const center = mpMap.getCenter();

  // Build an informational image showing the map extent
  const canvas = document.createElement('canvas');
  canvas.width  = 800;
  canvas.height = 600;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#f0f4f8';
  ctx.fillRect(0, 0, 800, 600);

  // Border
  ctx.strokeStyle = '#1a3a6b';
  ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, 796, 596);

  // Title
  ctx.fillStyle = '#1a3a6b';
  ctx.font = 'bold 18px Arial';
  ctx.fillText(caption, 20, 40);

  // Map info
  ctx.fillStyle = '#333';
  ctx.font = '13px Arial';
  ctx.fillText(`Center: ${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}`, 20, 70);
  ctx.fillText(`Zoom Level: ${zoom}`, 20, 92);
  ctx.fillText(`NW: ${bounds.getNorthWest().lat.toFixed(4)}, ${bounds.getNorthWest().lng.toFixed(4)}`, 20, 114);
  ctx.fillText(`SE: ${bounds.getSouthEast().lat.toFixed(4)}, ${bounds.getSouthEast().lng.toFixed(4)}`, 20, 136);

  // Note
  ctx.fillStyle = '#c07010';
  ctx.font = 'italic 11px Arial';
  ctx.fillText('Note: Switch to offline tiles to capture full map image.', 20, 570);

  const dataUrl = canvas.toDataURL('image/png');
  setImg(mpTargetKey, dataUrl, caption);
  const captEl = document.getElementById('imgCaption_' + mpTargetKey);
  if (captEl) captEl.value = caption;
  formData[mpTargetKey + '_caption'] = caption;
  closeMapPicker();
}

// ── Update imageField to add map picker button ─────────────────────────
// Patch the existing imageField calls to show a "Use Map" button
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.img-drop-zone').forEach(zone => {
    const key = zone.id.replace('imgZone_', '');
    if (!key) return;
    // Add "Use Map" button below drop zone
    const mapBtn = document.createElement('button');
    mapBtn.textContent = '🗺 Select Map Area';
    mapBtn.style.cssText = 'font-size:11px;padding:4px 12px;margin-top:6px;background:var(--eoc);border-color:var(--eoc);color:#fff';
    mapBtn.onclick = (e) => { e.stopPropagation(); openMapPicker(key); };
    // Insert after the drop zone
    zone.parentElement.insertBefore(mapBtn, zone.nextSibling);
  });
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICS Position Checklists — FieldCommand IMS</title>
<link rel="stylesheet" href="theme.css">
<style>
/* ── Layout ──────────────────────────────────────────────────── */
.pc-layout {
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 52px);
  overflow:hidden;
}
.pc-sidebar {
  background:var(--panel);
  border-right:1px solid var(--line);
  overflow-y:auto;
  padding:0;
}
.pc-main {
  overflow-y:auto;
  padding:20px 24px;
  background:var(--bg);
}

/* ── Header ──────────────────────────────────────────────────── */
.pc-header {
  background:linear-gradient(135deg,#001428,#002858);
  border-bottom:2px solid var(--eoc);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.pc-badge {
  background:var(--eoc);color:#fff;font-family:var(--font-hd);
  font-size:11px;padding:3px 10px;border-radius:3px;letter-spacing:2px;
}

/* ── Sidebar ─────────────────────────────────────────────────── */
.section-group {
  border-bottom:1px solid var(--line);
}
.section-group-header {
  padding:8px 14px;
  font-family:var(--font-hd);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  user-select:none;
}
.section-group-header:hover { background:rgba(255,255,255,0.03); }
.pos-btn {
  display:block;width:100%;text-align:left;
  padding:7px 14px 7px 22px;
  font-size:12px;color:var(--muted);
  background:transparent;border:none;cursor:pointer;
  border-left:3px solid transparent;
  transition:all 0.1s;
}
.pos-btn:hover { color:var(--txt);background:rgba(255,255,255,0.03); }
.pos-btn.active {
  color:var(--txt);font-weight:bold;
  background:rgba(26,58,107,0.15);
}
.pos-abbr {
  font-family:var(--font-hd);font-size:10px;
  padding:1px 5px;border-radius:3px;margin-right:6px;
  opacity:0.7;
}

/* ── Checklist cards ─────────────────────────────────────────── */
.pos-header-card {
  border-radius:10px;padding:18px 22px;margin-bottom:16px;
  color:#fff;
}
.pos-title { font-family:var(--font-hd);font-size:22px;letter-spacing:2px; }
.pos-subtitle { font-size:12px;opacity:0.7;margin-top:3px; }
.reports-to {
  margin-top:10px;font-size:12px;
  background:rgba(0,0,0,0.2);border-radius:5px;padding:8px 12px;
}

.checklist-section {
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  margin-bottom:12px;overflow:hidden;
}
.checklist-section-header {
  padding:10px 16px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--line);
  font-family:var(--font-hd);font-size:11px;letter-spacing:1px;
}
.checklist-body { padding:4px 0; }

.chk-item {
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 16px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  cursor:pointer;
  transition:background 0.1s;
}
.chk-item:last-child { border-bottom:none; }
.chk-item:hover { background:rgba(255,255,255,0.02); }
.chk-item.done { opacity:0.5; }
.chk-item.done .chk-text { text-decoration:line-through; }
.chk-box {
  width:17px;height:17px;border:2px solid var(--line);
  border-radius:3px;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-size:11px;
}
.chk-item.done .chk-box {
  background:var(--green);border-color:var(--green);color:#fff;
}
.chk-text { font-size:12px;line-height:1.5;color:var(--muted); }
.chk-item.done .chk-text { color:var(--dim); }
.chk-note {
  font-size:10px;color:var(--dim);font-style:italic;margin-top:2px;
}
.chk-tag {
  font-size:9px;padding:1px 6px;border-radius:8px;
  margin-left:4px;flex-shrink:0;
  font-family:var(--font-hd);letter-spacing:0.5px;
}
.tag-form   { background:rgba(26,58,107,0.3);color:#7eb4ea; }
.tag-brief  { background:rgba(26,122,58,0.3);color:#6ecc8a; }
.tag-coord  { background:rgba(200,118,10,0.3);color:#f0a040; }
.tag-safety { background:rgba(192,32,32,0.3);color:#f07070; }
.tag-doc    { background:rgba(100,50,150,0.3);color:#c0a0e0; }

.fallback-box {
  margin:0 16px 12px;
  background:rgba(192,32,32,0.08);border:1px solid rgba(192,32,32,0.25);
  border-radius:6px;padding:10px 14px;font-size:11px;color:var(--muted);line-height:1.6;
}
.fallback-box strong { color:var(--red); }

.deliverable-item {
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.deliverable-item:last-child { border-bottom:none; }
.del-form { font-family:var(--font-hd);font-size:11px;color:var(--amber);min-width:70px; }
.del-desc { font-size:12px;color:var(--muted); }
.del-when { font-size:10px;color:var(--dim);margin-left:auto; }

/* ── Progress bar ────────────────────────────────────────────── */
.progress-bar {
  height:4px;background:var(--line);border-radius:2px;
  margin:0 16px 12px;overflow:hidden;
}
.progress-fill {
  height:100%;background:var(--green);border-radius:2px;
  transition:width 0.3s;
}

/* ── Print styles ────────────────────────────────────────────── */
@media print {
  .pc-sidebar, .pc-header, .print-btn, #posSearch { display:none !important; }
  .pc-layout { display:block;height:auto; }
  .pc-main { padding:0;overflow:visible; }
  .checklist-section { page-break-inside:avoid;border:1px solid #ccc; }
  .pos-header-card { color:#000 !important;background:#1a3a6b !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact; }
  .chk-box { border:2px solid #333 !important;background:transparent !important; }
  .chk-item.done .chk-box { background:#1e8449 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact; }
  body { font-size:11px; }
  .chk-text { color:#333 !important; }
}
</style>
</head>
<body>

<div class="pc-header">
  <span class="pc-badge">ICS</span>
  <span style="font-family:var(--font-hd);font-size:14px;letter-spacing:2px">POSITION CHECKLISTS</span>
  <div style="font-size:11px;color:rgba(255,255,255,0.4)">
    Job duties, deliverables, and responsibilities for every ICS position
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button onclick="window.print()" class="print-btn"
      style="font-size:11px;padding:5px 14px;background:var(--eoc);border-color:var(--eoc);color:#fff">
      🖨 Print This Position
    </button>
    <button onclick="resetAllChecks()"
      style="font-size:11px;padding:5px 12px;background:var(--panel2)">
      ↺ Reset Checks
    </button>
    <a href="index.html" style="color:rgba(255,255,255,0.4);font-size:12px">← Dashboard</a>
  </div>
</div>

<div class="pc-layout">

<!-- ── Sidebar ──────────────────────────────────────────────── -->
<div class="pc-sidebar">
  <div style="padding:10px 14px;border-bottom:1px solid var(--line)">
    <input type="text" id="posSearch" placeholder="Search positions..."
      oninput="filterPositions()"
      style="width:100%;background:var(--input-bg);border:1px solid var(--line);
             color:var(--txt);padding:6px 10px;border-radius:4px;font-size:12px;
             box-sizing:border-box">
  </div>
  <div id="sidebarContent"></div>
</div>

<!-- ── Main content ──────────────────────────────────────────── -->
<div class="pc-main" id="mainContent">
  <div style="text-align:center;padding:60px 20px;color:var(--muted)">
    <div style="font-size:48px;margin-bottom:16px">📋</div>
    <div style="font-family:var(--font-hd);font-size:16px;letter-spacing:2px;margin-bottom:8px">
      SELECT A POSITION
    </div>
    <div style="font-size:12px">
      Choose an ICS position from the left sidebar to view its<br>
      job duties, checklists, deliverables, and responsibilities.
    </div>
  </div>
</div>

</div><!-- end layout -->

// ══════════════════════════════════════════════════════════════════
// SECTION CONFIG
// ══════════════════════════════════════════════════════════════════
const SECTIONS = [
  { id:'Command',    label:'Command',              color:'#c8760a', icon:'⭐' },
  { id:'Operations', label:'Operations Section',   color:'#1a5276', icon:'⚙️' },
  { id:'Planning',   label:'Planning Section',     color:'#1e8449', icon:'📋' },
  { id:'Logistics',  label:'Logistics Section',    color:'#9b59b6', icon:'📦' },
  { id:'Finance',    label:'Finance / Admin',      color:'#7f8c8d', icon:'💰' },
];

// Track checked state per position per session
const checkState = {};

function getChecks(posId) {
  if (!checkState[posId]) checkState[posId] = {};
  return checkState[posId];
}

// ══════════════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════════════
function buildSidebar(filter='') {
  const container = document.getElementById('sidebarContent');
  container.innerHTML = SECTIONS.map(sec => {
    const positions = POSITIONS.filter(p =>
      p.section === sec.id &&
      (!filter || p.title.toLowerCase().includes(filter.toLowerCase()) ||
       p.abbr.toLowerCase().includes(filter.toLowerCase()))
    );
    if (!positions.length) return '';
    return `
      <div class="section-group">
        <div class="section-group-header" style="color:${sec.color}"
          onclick="toggleSection('sec-${sec.id}')">
          <span>${sec.icon} ${sec.label}</span>
          <span style="font-size:9px;opacity:0.5">▼</span>
        </div>
        <div id="sec-${sec.id}">
          ${positions.map(p => `
            <button class="pos-btn" id="btn-${p.id}"
              style="border-left-color:${p.color}"
              onclick="showPosition('${p.id}')">
              <span class="pos-abbr" style="background:${p.color}22;color:${p.color}">${p.abbr}</span>
              ${p.title}
            </button>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

function filterPositions() {
  const q = document.getElementById('posSearch').value;
  buildSidebar(q);
  // Re-apply active state
  if (currentPos) {
    const btn = document.getElementById(`btn-${currentPos}`);
    if (btn) btn.classList.add('active');
  }
}

// ══════════════════════════════════════════════════════════════════
// RENDER POSITION
// ══════════════════════════════════════════════════════════════════
let currentPos = null;

function showPosition(id) {
  const pos = POSITIONS.find(p => p.id === id);
  if (!pos) return;
  currentPos = id;

  // Update sidebar active state
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`btn-${id}`);
  if (btn) btn.classList.add('active');

  const checks = getChecks(id);
  const main = document.getElementById('mainContent');

  // Count items for progress
  const allItems = [
    ...(pos.activation||[]),
    ...(pos.operational||[]),
    ...(pos.deactivation||[])
  ];
  const doneCount = allItems.filter((_,i) => checks[`item-${i}`]).length;

  main.innerHTML = `
    <!-- Position header -->
    <div class="pos-header-card" style="background:linear-gradient(135deg,${pos.color}dd,${pos.color}88)">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div class="pos-title">${pos.title}</div>
          <div class="pos-subtitle">${pos.section} Section &nbsp;·&nbsp; ${pos.abbr}</div>
        </div>
        <div style="text-align:right;font-size:12px;opacity:0.8">
          <div>${doneCount} / ${allItems.length} tasks completed</div>
          <div style="margin-top:4px;font-size:10px;opacity:0.7">Checks persist during session</div>
        </div>
      </div>
      <div class="reports-to">
        <div style="margin-bottom:3px">
          <strong>Reports to:</strong> ${pos.reports_to}
        </div>
        <div>
          <strong>Supervises:</strong> ${pos.supervises}
        </div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress-fill" style="width:${allItems.length?doneCount/allItems.length*100:0}%"></div>
    </div>

    <!-- Description -->
    <div class="checklist-section">
      <div class="checklist-section-header" style="background:rgba(0,0,0,0.2)">
        <span style="color:var(--amber)">📖</span>
        <span style="color:var(--amber)">POSITION DESCRIPTION</span>
      </div>
      <div style="padding:12px 16px;font-size:12px;color:var(--muted);line-height:1.7">
        ${pos.description}
      </div>
    </div>

    ${pos.fallback ? `
    <!-- Supervisor fallback -->
    <div class="fallback-box">
      <strong>⚠ IF THIS POSITION IS UNFILLED:</strong><br>
      ${pos.fallback}
    </div>` : ''}

    <!-- Activation checklist -->
    ${renderChecklist(pos, 'activation', '⚡ ACTIVATION CHECKLIST', 'First 30 minutes — do these in order', 'var(--amber)', checks)}

    <!-- Operational checklist -->
    ${renderChecklist(pos, 'operational', '🔄 OPERATIONAL PERIOD CHECKLIST', 'Recurring — every operational period', 'var(--blue)', checks)}

    <!-- Deliverables -->
    ${renderDeliverables(pos)}

    <!-- Meetings -->
    ${renderMeetings(pos)}

    <!-- Deactivation checklist -->
    ${renderChecklist(pos, 'deactivation', '✅ DEACTIVATION / DEMOBILIZATION', 'When incident closes or position transfers', 'var(--green)', checks)}

    <!-- ICS-214 reminder -->
    <div style="background:rgba(26,58,107,0.1);border:1px solid rgba(26,58,107,0.3);
                border-radius:6px;padding:10px 14px;font-size:11px;color:var(--muted);margin-top:4px">
      📋 <strong>All positions maintain an ICS-214 Activity Log.</strong>
      Document significant events, decisions, and actions continuously.
      Submit ICS-214 to Documentation Unit at the end of each operational period.
    </div>
  `;

  // Restore checkbox states
  Object.keys(checks).forEach(key => {
    if (checks[key]) {
      const el = document.getElementById(key+'-'+id);
      if (el) el.closest('.chk-item')?.classList.add('done');
    }
  });
}

function renderChecklist(pos, type, title, subtitle, color, checks) {
  const items = pos[type];
  if (!items || !items.length) return '';

  // Calculate offset for unique IDs (activation starts at 0, operational after activation)
  const offsets = { activation:0, operational:(pos.activation||[]).length, deactivation:(pos.activation||[]).length+(pos.operational||[]).length };
  const offset = offsets[type] || 0;

  return `
    <div class="checklist-section">
      <div class="checklist-section-header">
        <span style="color:${color}">${title}</span>
        <span style="font-size:10px;color:var(--dim);margin-left:auto">${subtitle}</span>
      </div>
      <div class="checklist-body">
        ${items.map((item, i) => {
          const globalIdx = offset + i;
          const key = `item-${globalIdx}`;
          const done = checks[key];
          const tagClass = item.tag ? `tag-${item.tag}` : '';
          const tagLabel = item.tag ? ({
            form:'ICS FORM', brief:'BRIEFING', coord:'COORDINATION',
            safety:'SAFETY', doc:'DOCUMENTATION'
          }[item.tag]||item.tag.toUpperCase()) : '';
          return `
            <div class="chk-item ${done?'done':''}" id="${key}-${pos.id}"
              onclick="toggleCheck('${pos.id}','${key}',this)">
              <div class="chk-box">${done?'✓':''}</div>
              <div style="flex:1">
                <div class="chk-text">
                  ${item.text}
                  ${tagClass?`<span class="chk-tag ${tagClass}">${tagLabel}</span>`:''}
                </div>
                ${item.note?`<div class="chk-note">${item.note}</div>`:''}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderDeliverables(pos) {
  if (!pos.deliverables || !pos.deliverables.length) return '';
  return `
    <div class="checklist-section">
      <div class="checklist-section-header">
        <span style="color:var(--blue)">📄 REQUIRED DELIVERABLES — ICS FORMS</span>
      </div>
      <div class="checklist-body">
        ${pos.deliverables.map(d=>`
          <div class="deliverable-item">
            <div class="del-form">${d.form}</div>
            <div class="del-desc">${d.desc}</div>
            <div class="del-when">${d.when}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderMeetings(pos) {
  if (!pos.meetings || !pos.meetings.length) return '';
  return `
    <div class="checklist-section">
      <div class="checklist-section-header">
        <span style="color:var(--green)">🗓 MEETINGS — PLANNING-P PARTICIPATION</span>
      </div>
      <div style="padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px">
        ${pos.meetings.map(m=>`
          <span style="font-size:11px;padding:4px 10px;background:rgba(26,122,58,0.1);
                       border:1px solid rgba(26,122,58,0.3);border-radius:4px;color:var(--green)">
            ${m}
          </span>`).join('')}
      </div>
    </div>`;
}

function toggleCheck(posId, key, el) {
  const checks = getChecks(posId);
  checks[key] = !checks[key];
  el.classList.toggle('done', checks[key]);
  const box = el.querySelector('.chk-box');
  if (box) box.textContent = checks[key] ? '✓' : '';
  updateProgress(posId);
}

function updateProgress(posId) {
  const pos = POSITIONS.find(p=>p.id===posId);
  if (!pos) return;
  const checks = getChecks(posId);
  const allItems = [...(pos.activation||[]),...(pos.operational||[]),...(pos.deactivation||[])];
  const done = allItems.filter((_,i)=>checks[`item-${i}`]).length;
  const pct = allItems.length ? done/allItems.length*100 : 0;
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = pct+'%';
  const countEl = document.querySelector('.pos-header-card div[style*="text-align:right"] div');
  if (countEl) countEl.textContent = `${done} / ${allItems.length} tasks completed`;
}

function resetAllChecks() {
  if (!currentPos) return;
  if (!confirm('Reset all checkboxes for this position?')) return;
  const checks = getChecks(currentPos);
  Object.keys(checks).forEach(k => delete checks[k]);
  showPosition(currentPos);
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildSidebar();
</script>
</body>
</html>

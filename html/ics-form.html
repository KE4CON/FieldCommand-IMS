<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICS Form — FieldCommand IMS</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.min.css">
<style>
/* Map picker modal */
.map-picker-modal {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:500; align-items:center; justify-content:center;
}
.map-picker-modal.open { display:flex; }
.map-picker-box {
  background:var(--panel); border:1px solid var(--eoc); border-radius:10px;
  width:92vw; max-width:1100px; height:88vh; display:flex; flex-direction:column;
}
.map-picker-toolbar {
  padding:10px 14px; border-bottom:1px solid var(--line);
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex-shrink:0;
}
.map-picker-toolbar .tool-group {
  display:flex; gap:4px; align-items:center;
}
.map-picker-toolbar .tool-sep {
  width:1px; height:20px; background:var(--line); margin:0 4px;
}
#mapPickerContainer { flex:1; position:relative; }
#mapPickerLeaflet { width:100%; height:100%; }
.map-picker-footer {
  padding:10px 14px; border-top:1px solid var(--line);
  display:flex; gap:8px; align-items:center; flex-shrink:0;
}
.annotation-label {
  font-size:10px; font-weight:bold; color:#fff;
  background:rgba(0,0,0,0.6); padding:2px 5px; border-radius:3px;
  white-space:nowrap;
}
</style>
<style>
.form-header {
  background: linear-gradient(135deg,#001428,#002858);
  border-bottom: 2px solid var(--eoc); padding: 10px 16px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.form-badge {
  background: var(--eoc); color: #fff; font-family: var(--font-hd);
  font-size: 12px; padding: 4px 12px; border-radius: 4px; letter-spacing: 2px;
}
.variant-pills { display: flex; gap: 4px; }
.variant-pill {
  padding: 3px 10px; border-radius: 10px; font-size: 11px;
  border: 1px solid var(--line); cursor: pointer; font-family: var(--font-hd);
}
.variant-pill.sel { background: var(--eoc); border-color: var(--eoc); color: #fff; }
.form-wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
.section-card {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; padding: 18px; margin-bottom: 14px;
}
.section-card h2 {
  font-family: var(--font-hd); font-size: 11px; letter-spacing: 2px;
  color: var(--eoc); margin: 0 0 14px; display: flex; align-items: center; gap: 10px;
}
.section-card h2::after { content:''; flex:1; height:1px; background:var(--line); }
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.fg label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.fg input, .fg select, .fg textarea {
  background: var(--input-bg); border: 1px solid var(--line);
  border-radius: 4px; color: var(--txt); padding: 7px 10px;
  font-size: 13px; width: 100%; box-sizing: border-box;
}
.fg textarea { resize: vertical; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--eoc); outline:none; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.full { grid-column: 1/-1; }
/* ── Image/Photo insert component ─────────────────────────────── */
.img-drop-zone {
  border: 2px dashed var(--line); border-radius: 8px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--bg); min-height: 80px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px;
}
.img-drop-zone:hover, .img-drop-zone.dragover {
  border-color: var(--eoc); background: rgba(26,58,107,0.08);
}
.img-drop-zone.has-image { border-style: solid; border-color: var(--green); padding: 8px; }
.img-drop-zone img { max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 4px; }
.img-drop-zone .drop-hint { font-size: 12px; color: var(--muted); }
.img-drop-zone .drop-icon { font-size: 28px; }
.img-toolbar {
  display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
}
.img-toolbar button { font-size: 11px; padding: 3px 10px; }
.img-caption { width: 100%; box-sizing: border-box; margin-top: 6px;
  background: var(--input-bg); border: 1px solid var(--line);
  border-radius: 4px; color: var(--txt); padding: 5px 8px; font-size: 12px;
}
.action-bar {
  position: sticky; bottom: 0; background: var(--panel);
  border-top: 1px solid var(--line); padding: 10px 16px;
  display: flex; gap: 8px; align-items: center; z-index: 10;
}
.save-indicator {
  font-size: 11px; color: var(--green); display: none;
}
/* ICS Print Form */
.ics-print {
  display: none; background: #fff; color: #000;
  font-family: Arial, sans-serif; font-size: 11px;
  border: 1px solid #000; margin: 16px;
}
.ics-print.show { display: block; }
.ics-print-header {
  display: flex; border-bottom: 2px solid #000;
}
.ics-print-header .logo-cell {
  width: 80px; border-right: 1px solid #000; padding: 6px;
  display: flex; align-items: center; justify-content: center;
}
.ics-print-header .logo-cell img { max-width: 70px; max-height: 60px; object-fit: contain; }
.ics-print-header .title-cell { flex: 1; padding: 8px 12px; text-align: center; }
.ics-print-header .title-cell h1 { font-size: 16px; font-weight: bold; margin: 0 0 3px; }
.ics-print-header .title-cell .sub { font-size: 11px; color: #444; }
.ics-print-header .meta-cell {
  border-left: 1px solid #000; padding: 6px 10px; min-width: 140px;
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
}
.ics-print-header .meta-cell .ml { font-size: 9px; text-transform: uppercase; color: #666; }
.ics-print-header .meta-cell .mv { font-size: 12px; font-weight: bold; }
.pr { display: flex; border-bottom: 1px solid #000; }
.pr:last-child { border-bottom: none; }
.pc { padding: 5px 8px; border-right: 1px solid #000; flex: 1; }
.pc:last-child { border-right: none; }
.pc .pl { font-size: 9px; text-transform: uppercase; color: #555; margin-bottom: 2px; }
.pc .pv { font-size: 11px; min-height: 16px; white-space: pre-wrap; }
.pc .pw { min-height: 60px; }
.pc.w2 { flex: 2; }
.pc.w3 { flex: 3; }
.pc.w4 { flex: 4; }
.sig-row { display: flex; min-height: 50px; border-top: 1px solid #000; }
.sig-cell { flex: 1; padding: 5px 8px; border-right: 1px solid #000; }
.sig-cell:last-child { border-right: none; }
.sig-cell .sl { font-size: 9px; text-transform: uppercase; color: #555; }
.sig-cell .ss { border-bottom: 1px solid #000; margin: 12px 0 4px; min-height: 18px; }
.print-footer { border-top: 1px solid #000; padding: 4px 8px; font-size: 8px; color: #666; display: flex; justify-content: space-between; }
@media print {
  .form-header,.action-bar,.form-wrap { display: none !important; }
  .ics-print { display: block !important; margin: 0; border: none; }
}
</style>
</head>
<body>

<div class="form-header">
  <span class="form-badge" id="formBadge">ICS</span>
  <span style="font-family:var(--font-hd);font-size:14px;letter-spacing:2px" id="formTitle">ICS Form</span>
  <div style="display:flex;flex-direction:column;gap:2px;margin-left:8px">
    <div style="font-size:10px;color:var(--muted)">Form Variant</div>
    <div class="variant-pills" id="variantPills">
      <div class="variant-pill sel" onclick="setVariant('FEMA')">FEMA</div>
      <div class="variant-pill" onclick="setVariant('USCG')">USCG</div>
      <div class="variant-pill" onclick="setVariant('NWCG')">NWCG</div>
    </div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <button onclick="saveForm()"
      style="background:var(--eoc);border-color:var(--eoc);color:#fff;font-weight:bold">
      💾 Save
    </button>
    <button onclick="printForm()">🖨 Print</button>
    <a id="backLink" href="incident.html" style="color:var(--muted);font-size:12px">← Incident</a>
  </div>
</div>

<div class="form-wrap" id="formWrap">
  <div style="color:var(--muted);text-align:center;padding:40px">Loading form...</div>
</div>

<div class="action-bar">
  <button onclick="saveForm()"
    style="background:var(--eoc);border-color:var(--eoc);color:#fff;font-weight:bold;padding:8px 24px">
    💾 Save Form
  </button>
  <button onclick="printForm()" style="padding:8px 16px">🖨 Print / Export</button>
  <span class="save-indicator" id="saveIndicator">✓ Saved</span>
  <div style="margin-left:auto;font-size:11px;color:var(--dim)" id="formMeta"></div>
</div>

<!-- Print view (hidden until print) -->
<div class="ics-print" id="printView"></div>

<script>
const ICS_API  = 'http://192.168.50.1:5051';
const MAIN_API = 'http://192.168.50.1:5050';

const params    = new URLSearchParams(location.search);
const FORM_NUM  = params.get('form') || '201';
const INC_ID    = params.get('incident') || '';
const PERIOD    = parseInt(params.get('period') || '1');
let   VARIANT   = 'FEMA';
let   incData   = {};
let   orgData   = {};
let   savedId   = null;

// ── Load org and incident context ─────────────────────────────────────
async function loadContext() {
  try {
    const [orgR, incR, giR] = await Promise.all([
      fetch(`${MAIN_API}/api/config`),
      INC_ID ? fetch(`${ICS_API}/api/ics/incidents/${INC_ID}`) : Promise.resolve(null),
      INC_ID ? fetch(`${ICS_API}/api/ics/general_info?incident_id=${INC_ID}&period=${PERIOD}`) : Promise.resolve(null)
    ]);
    orgData = orgR.ok ? await orgR.json() : {};
    if (incR?.ok) {
      const d = await incR.json();
      incData = d.incident || d;
    }
    // Merge General Info on top of incData — GI fields take precedence
    if (giR?.ok) {
      const gi = await giR.json();
      // Map GI fields into incData so val() auto-populates all forms
      incData = { ...incData, ...gi };
      // Ensure key aliases are set
      if (gi.incident_name)  incData.incident_name  = gi.incident_name;
      if (gi.safety_officer) incData.safety_officer = gi.safety_officer;
      if (gi.prepared_by)    incData.prepared_by    = gi.prepared_by;
      if (gi.approved_by)    incData.approved_by    = gi.approved_by;
      if (gi.operational_period_from) {
        incData.operational_period_from = gi.operational_period_from;
        incData.from_date = gi.operational_period_from?.slice(0,10) || '';
      }
      if (gi.operational_period_to) {
        incData.operational_period_to = gi.operational_period_to;
        incData.to_date = gi.operational_period_to?.slice(0,10) || '';
      }
      incData.operational_period_number = PERIOD;
    } else {
      // Try localStorage fallback when offline
      try {
        const cached = localStorage.getItem(`gi_${INC_ID}_${PERIOD}`);
        if (cached) {
          const gi = JSON.parse(cached);
          incData = { ...incData, ...gi };
        }
      } catch(e) {}
    }
    VARIANT = incData.ics_variant || orgData.ics_form_variant || 'FEMA';
    setVariant(VARIANT, false);
    if (INC_ID) {
      document.getElementById('backLink').href = `incident.html?incident=${INC_ID}`;
    }
    // Add General Info link to back area if we have an incident
    if (INC_ID) {
      const bl = document.getElementById('backLink');
      if (bl) {
        const giLink = document.createElement('a');
        giLink.href  = `general_info.html?incident=${INC_ID}&period=${PERIOD}`;
        giLink.textContent = '📋 General Info';
        giLink.style.cssText = 'color:var(--amber);font-size:11px;margin-left:10px;text-decoration:none';
        bl.parentNode.insertBefore(giLink, bl.nextSibling);
      }
    }
    // Try to load existing saved form
    await loadSavedForm();
    // Render the form
    renderForm();
  } catch(e) {
    console.error('Context load failed', e);
    renderForm();
  }
}

async function loadSavedForm() {
  if (!INC_ID) return;
  try {
    const r = await fetch(
      `${ICS_API}/api/ics/forms/ics${FORM_NUM}?incident_id=${INC_ID}&period=${PERIOD}`);
    const forms = await r.json();
    if (forms.length) {
      // ICS-211 uses fixed ID ics211-{incident_id}
      savedId = FORM_NUM === '211' ? `ics211-${INC_ID}` : forms[0].id;
      const data = JSON.parse(forms[0].data || '{}');
      // Merge saved data into formData
      Object.assign(formData, data);
      // Update last sync display for ICS-211
      if (FORM_NUM === '211') {
        const updated = forms[0].updated || forms[0].created || '';
        const ls = document.getElementById('ci211LastSync');
        if (ls && updated) ls.textContent = new Date(updated).toLocaleString();
      }
    }
  } catch(e) {}
}

function setVariant(v, rerender=true) {
  VARIANT = v;
  document.querySelectorAll('.variant-pill').forEach(el => {
    el.classList.toggle('sel', el.textContent === v);
  });
  if (rerender && document.getElementById('formWrap').children.length) renderForm();
}

// ── Form data store ────────────────────────────────────────────────────
let formData = {};

function val(key, def='') {
  return formData[key] ?? incData[key] ?? orgData[key] ?? def;
}
function now() { return new Date().toISOString().slice(0,16); }
function todayDate() { return new Date().toISOString().slice(0,10); }

// ── Collect all form field values ─────────────────────────────────────
function collectFormData() {
  const data = {};
  document.querySelectorAll('[data-key]').forEach(el => {
    data[el.dataset.key] = el.value || el.textContent || '';
  });
  return data;
}

// ── Save form ──────────────────────────────────────────────────────────
async function saveForm() {
  const data = collectFormData();
  data.form_type = `ics${FORM_NUM}`;
  data.variant = VARIANT;
  data.period = PERIOD;
  data.incident_id = INC_ID;
  data.updated = new Date().toISOString();

  const payload = {
    id: savedId,
    incident_id: INC_ID,
    period: PERIOD,
    summary: data.incident_name || incData.name || `ICS-${FORM_NUM}`,
    data: JSON.stringify(data),
  };

  try {
    const r = await fetch(`${ICS_API}/api/ics/forms/ics${FORM_NUM}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const result = await r.json();
    if (result.ok) {
      savedId = result.id || savedId;
      const ind = document.getElementById('saveIndicator');
      ind.style.display = 'inline';
      setTimeout(() => ind.style.display = 'none', 3000);
      Object.assign(formData, data);
    }
  } catch(e) {
    // Offline — save to localStorage
    localStorage.setItem(`ics${FORM_NUM}-${INC_ID}-${PERIOD}`, JSON.stringify(data));
    const ind = document.getElementById('saveIndicator');
    ind.textContent = '✓ Saved locally';
    ind.style.display = 'inline';
    setTimeout(() => { ind.style.display='none'; ind.textContent='✓ Saved'; }, 3000);
  }
}

// ── Print form ─────────────────────────────────────────────────────────
function printForm() {
  collectFormData(); // ensure latest
  buildPrintView();
  window.print();
}

// ── Image field helper ────────────────────────────────────────────────
function imageField(key, label, hint='') {
  return `<div class="fg">
    <label>${label}${hint ? `<span style="font-weight:normal;color:var(--dim);margin-left:6px">${hint}</span>` : ''}</label>
    <div class="img-drop-zone" id="imgZone_${key}"
      onclick="document.getElementById('imgFile_${key}').click()"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleImgDrop(event,'${key}')">
      <span class="drop-icon">🖼</span>
      <span class="drop-hint">Click to upload or drag & drop<br>PNG · JPG · GIF · SVG · PDF page</span>
    </div>
    <input type="file" id="imgFile_${key}" accept="image/*,application/pdf"
      style="display:none" onchange="handleImgUpload(event,'${key}')">
    <div class="img-toolbar" id="imgToolbar_${key}" style="display:none">
      <button onclick="rotateImg('${key}',-90)">↺ Rotate L</button>
      <button onclick="rotateImg('${key}',90)">↻ Rotate R</button>
      <button onclick="clearImg('${key}')" style="background:var(--panel2)">✕ Remove</button>
    </div>
    <input type="text" class="img-caption" id="imgCaption_${key}"
      data-key="${key}_caption" placeholder="Caption / description (optional)"
      style="display:none">
    <input type="hidden" id="imgData_${key}" data-key="${key}_img">
  </div>`;
}

// Image handling functions
function handleImgUpload(event, key) {
  const file = event.target.files[0];
  if (!file) return;
  readImgFile(file, key);
}
function handleImgDrop(event, key) {
  event.preventDefault();
  document.getElementById('imgZone_'+key)?.classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) readImgFile(file, key);
}
function readImgFile(file, key) {
  if (file.size > 10 * 1024 * 1024) { alert('Image must be under 10 MB'); return; }
  const reader = new FileReader();
  reader.onload = e => setImg(key, e.target.result, file.name);
  reader.readAsDataURL(file);
}
function setImg(key, dataUrl, name='') {
  const zone    = document.getElementById('imgZone_'+key);
  const toolbar = document.getElementById('imgToolbar_'+key);
  const caption = document.getElementById('imgCaption_'+key);
  const hidden  = document.getElementById('imgData_'+key);
  if (!zone) return;
  zone.innerHTML = `<img id="imgEl_${key}" src="${dataUrl}" alt="${name}">`;
  zone.classList.add('has-image');
  toolbar.style.display = 'flex';
  caption.style.display = 'block';
  hidden.value = dataUrl;
  formData[key+'_img'] = dataUrl;
  formData[key+'_name'] = name;
}
function clearImg(key) {
  const zone    = document.getElementById('imgZone_'+key);
  const toolbar = document.getElementById('imgToolbar_'+key);
  const caption = document.getElementById('imgCaption_'+key);
  const hidden  = document.getElementById('imgData_'+key);
  const fileEl  = document.getElementById('imgFile_'+key);
  zone.innerHTML = '<span class="drop-icon">🖼</span><span class="drop-hint">Click to upload or drag & drop<br>PNG · JPG · GIF · SVG</span>';
  zone.classList.remove('has-image');
  toolbar.style.display = 'none';
  caption.style.display = 'none';
  hidden.value = '';
  if (fileEl) fileEl.value = '';
  delete formData[key+'_img'];
}
let imgRotations = {};
function rotateImg(key, deg) {
  imgRotations[key] = ((imgRotations[key]||0) + deg + 360) % 360;
  const el = document.getElementById('imgEl_'+key);
  if (el) el.style.transform = `rotate(${imgRotations[key]}deg)`;
}
// Restore saved images on form load
function restoreImages() {
  Object.keys(formData).forEach(k => {
    if (k.endsWith('_img') && formData[k]) {
      const key = k.replace('_img','');
      setImg(key, formData[k], formData[key+'_name']||'');
      const caption = document.getElementById('imgCaption_'+key);
      if (caption && formData[key+'_caption']) caption.value = formData[key+'_caption'];
    }
  });
}

// ── Field helper ───────────────────────────────────────────────────────
function field(key, label, type='text', placeholder='', opts={}) {
  const v = val(key);
  const tag = type === 'textarea' ? 'textarea' : 'input';
  const rows = opts.rows || 3;
  const inner = type === 'textarea'
    ? `<textarea data-key="${key}" rows="${rows}" placeholder="${placeholder}">${v}</textarea>`
    : `<input type="${type}" data-key="${key}" value="${v}" placeholder="${placeholder}">`;
  return `<div class="fg"><label>${label}</label>${inner}</div>`;
}

function select(key, label, options, def='') {
  const v = val(key, def);
  const opts = options.map(o =>
    `<option ${o===v?'selected':''}>${o}</option>`).join('');
  return `<div class="fg"><label>${label}</label><select data-key="${key}">${opts}</select></div>`;
}

// ── Logo helper ─────────────────────────────────────────────────────────
function logoHtml() {
  if (orgData.logo_data && orgData.logo_mime) {
    return `<img src="data:${orgData.logo_mime};base64,${orgData.logo_data}" style="max-width:70px;max-height:60px;object-fit:contain">`;
  }
  return `<div style="font-family:var(--font-hd);font-size:9px;color:#888;text-align:center">
    ${orgData.org_short || orgData.callsign || 'ICS'}</div>`;
}

// ── Print cell builder ─────────────────────────────────────────────────
function pc(label, key, cls='', tall=false) {
  const v = formData[key] || incData[key] || orgData[key] || '';
  return `<div class="pc ${cls}"><div class="pl">${label}</div><div class="pv ${tall?'pw':''}">${v}</div></div>`;
}

// ── FORM RENDERERS ─────────────────────────────────────────────────────
const FORMS = {};

// ══════════════════════════════════════════════════════════════════
// ICS-201 INCIDENT BRIEFING
// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
// NIMS RESOURCE TYPE PICKER — reusable across all forms
// ══════════════════════════════════════════════════════════════════
let _rtCache = null;

async function loadResourceTypes(forceRefresh=false) {
  if (_rtCache && !forceRefresh) return _rtCache;
  try {
    const r = await fetch(`${MAIN_API}/api/resource_types`);
    _rtCache = await r.json();
  } catch(e) { _rtCache = []; }
  return _rtCache;
}

// Show picker — onSelect(type) called with selected resource type object
async function showResourceTypePicker(onSelect, filterCategory='') {
  const types = await loadResourceTypes();
  if (!types.length) {
    alert('Resource type library not available. Check API connection.');
    return;
  }
  const cats = [...new Set(types.map(t=>t.category))].sort();
  const catColors = {
    'Fire':'#c0392b','Search and Rescue':'#e67e22','Medical':'#e91e8c',
    'Law Enforcement':'#1a5276','Public Works':'#7d6608','Mass Care':'#1e8449',
    'Communications':'#6c3483','Incident Management':'#1a3a6b',
    'Transportation':'#0e6655','Logistics':'#784212','UAS':'#2980b9','Other':'#555'
  };

  const overlay = document.createElement('div');

  let searchQ = '';

  function renderPicker() {
    let filtered = types;
    if (activeCat) filtered = filtered.filter(t => t.category === activeCat);
    if (searchQ) filtered = filtered.filter(t =>
      JSON.stringify(t).toLowerCase().includes(searchQ.toLowerCase()));

    const groups = {};
    filtered.forEach(t => {
      if (!groups[t.category]) groups[t.category] = [];
      groups[t.category].push(t);
    });

    overlay.innerHTML = `
      <div style="background:var(--panel,#161b22);border:2px solid var(--amber,#c8760a);

          ${Object.entries(groups).map(([cat, items]) => `

        </div>

    const searchEl = document.getElementById('rtPickerSearch');
    if (searchEl) {
      searchEl.addEventListener('input', () => {
        searchQ = searchEl.value;
        rerenderPicker();
      });
      searchEl.focus();
    }
  }

  function rerenderPicker() {
    const catEl = document.getElementById('rtActiveCat');
    if (catEl) activeCat = catEl.value;
    renderPicker();
  }

  window.rerenderPicker = rerenderPicker;

  window.selectRT = function(t) {
    overlay.remove();
    delete window.rerenderPicker;
    delete window.selectRT;
    onSelect(t);
  };

  document.body.appendChild(overlay);
  renderPicker();
}

// Convenience: fill a resource name + type field pair
function pickResourceTypeIntoFields(nameKey, typeKey, categoryHint='') {
  showResourceTypePicker(t => {
    const typeStr = t.type_level ? `${t.kind} \u2013 ${t.type_level}` : t.kind;
    const nameEl = document.querySelector(`[data-key="${nameKey}"]`);
    const typeEl = document.querySelector(`[data-key="${typeKey}"]`);
    if (nameEl) nameEl.value = typeStr;
    if (typeEl) typeEl.value = t.type_level || '';
  }, categoryHint);
}

        </a>
      </div>`;
    return;
  }
  document.title = `${def.title} — FieldCommand IMS`;
  document.getElementById('formWrap').innerHTML = def.render();

  Object.entries(formData).forEach(([k,v]) => {

// ICS-202 objectives state
let state202 = { objectives: [] };

function prefillObjective(val) {
  if (!val) return;
  document.getElementById('newObjText').value = val;
  document.getElementById('commonObjSel').value = '';
  document.getElementById('newObjText').focus();
}

function addObjective202() {
  const txt = document.getElementById('newObjText').value.trim();
  if (!txt) return;
  state202.objectives.push(txt);
  document.getElementById('newObjText').value = '';
  renderObjectives202();
}

function removeObjective202(i) {
  state202.objectives.splice(i, 1);
  renderObjectives202();
}

function moveObjective202(i, dir) {
  const arr = state202.objectives;
  const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  renderObjectives202();
}

function renderObjectives202() {
  const el = document.getElementById('objList202');
  if (!el) return;
  if (!state202.objectives.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">No objectives added yet.</div>';
    return;
  }
  el.innerHTML = state202.objectives.map((o,i) => `
    <div style="display:flex;gap:8px;align-items:flex-start;padding:8px;
                background:var(--panel2);border-radius:5px;margin-bottom:5px;border:1px solid var(--line)">
      <span style="font-family:var(--font-hd);font-size:13px;color:var(--amber);
                   min-width:24px;padding-top:2px">${i+1}.</span>
      <span style="flex:1;font-size:13px;line-height:1.5">${o}</span>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button onclick="moveObjective202(${i},-1)" title="Move up"
          style="font-size:11px;padding:2px 6px;background:var(--panel)">↑</button>
        <button onclick="moveObjective202(${i},1)" title="Move down"
          style="font-size:11px;padding:2px 6px;background:var(--panel)">↓</button>
        <button onclick="removeObjective202(${i})" title="Remove"
          style="font-size:11px;padding:2px 6px;background:var(--panel);color:var(--red)">✕</button>
      </div>
    </div>`).join('');
  // Store in formData for save
  formData['objectives_json'] = JSON.stringify(state202.objectives);
}

async function loadAssignments203() {
  if (!INC_ID) return;
  try {
    const r = await fetch(`${ICS_API}/api/ics/assignments?incident_id=${INC_ID}`);
    const data = await r.json();
    let populated = 0;

    // From check-in assignments (authoritative)
    (data.assignments || []).forEach(a => {
      const key = POSITION_MAP[a.ics_position];
      if (key && !formData[key]) {
        const display = a.name ? `${a.name} (${a.callsign})` : a.callsign;
        formData[key] = display;
        const el = document.querySelector(`[data-key="${key}"]`);
        if (el) { el.value = display; el.style.background='rgba(26,122,58,0.1)'; }
        populated++;
      }
    });

    // From roster roles (fallback for positions not yet checked in)
    (data.roster_roles || []).forEach(r => {
      const key = POSITION_MAP[r.role];
      if (key && !formData[key]) {
        const display = r.name ? `${r.name} (${r.callsign||r.radio_id||''})`.trim() : r.callsign||'';
        if (display) {
          formData[key] = display;
          const el = document.querySelector(`[data-key="${key}"]`);
          if (el) { el.value = display; el.style.background='rgba(26,58,107,0.1)'; }
          populated++;
        }
      }
    });

    formData._203_loaded = true;
    if (populated > 0) {
      const banner = document.createElement('div');
      banner.style.cssText = 'background:rgba(26,122,58,0.15);border:1px solid var(--green);border-radius:5px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:var(--green)';
      banner.innerHTML = `✓ Auto-populated ${populated} field${populated!==1?'s':''} from check-in assignments and roster. <span style="color:var(--amber)">(Green = from check-in · Blue = from roster)</span> Edit any field as needed.`;
      const wrap = document.getElementById('formWrap');
      if (wrap) wrap.prepend(banner);
    }
  } catch(e) {
    console.log('Assignment load failed (offline?):', e);
  }
}

FORMS['203A'] = {
  title: 'ICS-203A Additional Operational Assignments',
  badge: 'ICS-203A',
  variants: { FEMA:'203A Additional Ops', USCG:'203A Additional Ops', NWCG:'203A Additional Ops' },

  // Roman numeral branch labels — starts at III to continue from 203 which covers I-II
  _romanOf(n) {
    const map = ['','I','II','III','IV','V','VI','VII','VIII','IX','X',
                 'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
    return map[n] || String(n);
  },

  // Branch color — matches 204A convention
  _branchColor(n) {
    const colors = ['#c0392b','#e67e22','#f1c40f','#27ae60','#2980b9','#8e44ad'];
    return colors[(n-1) % colors.length];
  },

  // Render a single branch block (branchNum = 3+ continuing from 203)
  _branchBlock(bn) {
    const rom   = FORMS['203A']._romanOf(bn);
    const color = FORMS['203A']._branchColor(bn);
    const prefix = `b${bn}`;
    // 5 division/group slots per branch on 203A (same as 203A standard)
    const divSlots = [1,2,3,4,5].map(d => `
          <div class="fg">
            <label style="font-size:10px;color:var(--muted)">
              Division / Group ${String.fromCharCode(64 + (bn-3)*5 + d)}
            </label>
            <input type="text" data-key="${prefix}_div${d}_sup"
              value="${formData[prefix+'_div'+d+'_sup']||''}"
              placeholder="Supervisor name"
              style="width:100%;box-sizing:border-box;background:var(--input-bg);
                     border:1px solid var(--line);color:var(--txt);
                     padding:6px 8px;font-size:12px;border-radius:3px"
              oninput="formData['${prefix}_div${d}_sup']=this.value;markDirty()">
          </div>`).join('');
    return `
      <div class="section-card" style="border-left:4px solid ${color}">
        <h2 style="color:${color}">Branch ${rom}</h2>
        <div class="grid-2" style="margin-bottom:8px">
          <div class="fg">
            <label style="font-size:10px;color:var(--muted)">Branch ${rom} Director</label>
            <input type="text" data-key="${prefix}_dir"
              value="${formData[prefix+'_dir']||''}"
              placeholder="Branch Director name"
              style="width:100%;box-sizing:border-box;background:var(--input-bg);
                     border:1px solid var(--line);color:var(--txt);
                     padding:6px 8px;font-size:12px;border-radius:3px"
              oninput="formData['${prefix}_dir']=this.value;markDirty()">
          </div>
          <div class="fg">
            <label style="font-size:10px;color:var(--muted)">Location / Frequency</label>
            <input type="text" data-key="${prefix}_loc"
              value="${formData[prefix+'_loc']||''}"
              placeholder="Location or tactical frequency"
              style="width:100%;box-sizing:border-box;background:var(--input-bg);
                     border:1px solid var(--line);color:var(--txt);
                     padding:6px 8px;font-size:12px;border-radius:3px"
              oninput="formData['${prefix}_loc']=this.value;markDirty()">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
          ${divSlots}
        </div>
      </div>`;
  },

  render() {
    document.getElementById('formTitle').textContent = 'ICS-203A — Additional Operational Assignments';
    document.getElementById('formBadge').textContent = 'ICS-203A';
    document.getElementById('formMeta').textContent =
      `Additional Ops · Period ${PERIOD} · ${incData.name||'No incident'}`;

    const numBranches = parseInt(formData._203a_branch_count || 4);

    // Build branch blocks starting at III (3) — 203 covers I and II
    let branchHtml = '';
    for (let bn = 3; bn <= numBranches + 2; bn++) {
      branchHtml += FORMS['203A']._branchBlock(bn);
    }

    return `
    <div class="section-card">
      <h2>1. Incident & Period Information</h2>
      <div style="background:rgba(200,118,10,0.08);border:1px solid rgba(200,118,10,0.25);
                  border-radius:5px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--amber)">
        ℹ ICS-203A extends the ICS-203 for incidents requiring more than 2 branches.
        Branches I and II are on the standard ICS-203. This form adds Branches III onward.
        <a href="ics-form.html?form=203&incident=${INC_ID}&period=${PERIOD}"

        ${field('date_prepared','Date Prepared','date',todayDate())}

      <div class="grid-2">
        ${field('operational_period_from','Op Period From','datetime-local','')}
        ${field('operational_period_to','Op Period To','datetime-local','')}
      </div>
    </div>

    <div class="section-card">
      <h2>2. Additional Branches</h2>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <label style="font-size:12px;color:var(--muted)">Number of additional branches:</label>

          value="${numBranches}"
          style="width:60px;background:var(--input-bg);border:1px solid var(--line);
                 color:var(--txt);padding:5px 8px;font-size:13px;border-radius:4px"
          onchange="formData._203a_branch_count=this.value;renderForm()">
        <span style="font-size:11px;color:var(--dim)">

    <div class="section-card">
      <h2>3. Prepared By</h2>

  },

  buildPrint() {

    return `

// ── ITEM 8: Duplicate resource check ──────────────────────────────
function check204Duplicates() {
  const fd = collectFormData();
  const assigned = {};
  const dups = [];
  for (let i = 0; i < res204Count; i++) {
    const rid = (fd['res204_id_'+i]||'').trim().toUpperCase();
    if (!rid || rid.endsWith('+')) continue;
    if (assigned[rid]) {
      dups.push(rid);
    } else {
      assigned[rid] = true;
    }
  }
  if (dups.length) {
    alert('⚠ DUPLICATE RESOURCES FOUND:\n\n' +
          dups.map(d => '  • ' + d).join('\n') +
          '\n\nThese resources appear more than once on this 204.\nCheck your assignments.');
  } else {
    alert('✓ No duplicate resources found on this form.\n\nNote: This only checks this single 204. ' +
          'Cross-204 duplicate checking is available from the incident dashboard.');
  }
}

// ── ITEM 10: Sort resources on 204 ────────────────────────────────
function sort204Resources() {
  const tbody = document.getElementById('res204Body');
  if (!tbody) return;
  const fd = collectFormData();
  // Collect all rows with data
  const rows = [];
  for (let i = 0; i < res204Count; i++) {
    const rid  = fd['res204_id_'+i] || '';
    const ldr  = fd['res204_leader_'+i] || '';
    const type = fd['res204_type_'+i] || '';
    const pers = fd['res204_personnel_'+i] || '';
    const cont = fd['res204_contact_'+i] || '';
    const time = fd['res204_time_'+i] || '';
    const loc  = fd['res204_location_'+i] || '';
    if (rid || ldr) rows.push({ rid, ldr, type, pers, cont, time, loc });
  }
  // Sort: placeholders (ending in +) last, then by type, then by ID
  rows.sort((a, b) => {
    const aPlac = a.rid.endsWith('+');
    const bPlac = b.rid.endsWith('+');
    if (aPlac !== bPlac) return aPlac ? 1 : -1;
    const typeOrder = ['CREW','ENG','DOZ','HELO','AIRT','WATR','MEDE'];
    const aType = typeOrder.findIndex(t => a.type.toUpperCase().startsWith(t));
    const bType = typeOrder.findIndex(t => b.type.toUpperCase().startsWith(t));
    if (aType !== bType) return (aType === -1 ? 99 : aType) - (bType === -1 ? 99 : bType);
    return a.rid.localeCompare(b.rid);
  });
  // Rebuild the body
  tbody.innerHTML = '';
  res204Count = 0;
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.id = 'res204row_' + i;
    tr.innerHTML = FORMS['204']._resRow(i, r).replace(/^<tr[^>]*>/,'').replace(/<\/tr>$/,'');
    tbody.appendChild(tr);
    // Store sorted values
    formData['res204_id_'+i]        = r.rid;
    formData['res204_leader_'+i]    = r.ldr;
    formData['res204_type_'+i]      = r.type;
    formData['res204_personnel_'+i] = r.pers;
    formData['res204_contact_'+i]   = r.cont;
    formData['res204_time_'+i]      = r.time;
    formData['res204_location_'+i]  = r.loc;
    res204Count++;
  });
  // Pad to at least 8 rows
  while (res204Count < 8) {
    const tr = document.createElement('tr');
    tr.innerHTML = FORMS['204']._resRow(res204Count++).replace(/^<tr[^>]*>/,'').replace(/<\/tr>$/,'');
    tbody.appendChild(tr);
  }
  markDirty();
}

// ICS-204A BRIEFING SHEET (non-standard, widely used)
// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
FORMS['203S'] = {
  title: 'ICS-203S Branch Safety Officer Rotation',
  badge: 'ICS-203S',
  variants: { FEMA:'203S SOFR Rotation', USCG:'203S SOFR Rotation', NWCG:'203S SOFR Rotation' },

  _branchColor(n) {
    const colors = ['#c0392b','#e67e22','#f1c40f','#27ae60','#2980b9','#8e44ad',
                    '#c0392b','#e67e22','#f1c40f','#27ae60'];
    return colors[(n-1) % colors.length];
  },

  _romanOf(n) {
    const map = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'];
    return map[n] || String(n);
  },

  // Calculate whether an operational period date is ODD or EVEN day
  _isOddPeriod() {
    const dtStr = formData.operational_period_from || incData.operational_period_from || '';
    if (!dtStr) return true; // default odd
    try {
      const d = new Date(dtStr);
      return d.getDate() % 2 === 1;
    } catch(e) { return true; }
  },

  render() {
    document.getElementById('formTitle').textContent = 'ICS-203S — Branch Safety Officer Rotation';
    document.getElementById('formBadge').textContent = 'ICS-203S';
    document.getElementById('formMeta').textContent =
      `SOFR Rotation · Period ${PERIOD} · ${incData.name||'No incident'}`;

    const numBranches = parseInt(formData._203s_branch_count || 5);
    const isOdd = FORMS['203S']._isOddPeriod();
    const periodDay = isOdd ? 'ODD' : 'EVEN';
    const activeCol = isOdd ? 'odd' : 'even';

    let branchRows = '';
    for (let bn = 1; bn <= numBranches; bn++) {
      const rom   = FORMS['203S']._romanOf(bn);

let _230count = 8;
function add230Row() {
  const n = parseInt(formData._230_count || 8);
  const tbody = document.getElementById('t230body');

  const tr = document.createElement('tr');
  tr.id = `m230row_${n}`;
  tr.innerHTML = FORMS['230']._rowHtml(n, null)
    .replace(/^<tr[^>]*>/,'').replace(/<\/tr>$/,'');
  tbody.appendChild(tr);
  formData._230_count = n + 1;
  markDirty();
}
function del230Row(i) {
  const row = document.getElementById(`m230row_${i}`);
  if (row) row.remove();
  ['time','name','location','lead','attendees'].forEach(k => {
    delete formData[`m230_${i}_${k}`];

  markDirty();
}

// ── ITEM 9: IAP Print Count Estimator ────────────────────────────
async function showIAPPrintEstimator() {
  if (!INC_ID) { alert('Select an incident first'); return; }
  try {
    // Fetch all 204 forms for this period to count resources by type
    const r = await fetch(`${ICS_API}/api/ics/forms/ics204?incident_id=${INC_ID}&period=${PERIOD}`);
    const forms = r.ok ? await r.json() : [];

    let totalField = 0, totalOverhead = 0, totalAir = 0, divCount = 0;
    const typeCounts = {};

    forms.forEach(f => {
      let d = {};
      try { d = JSON.parse(f.data || '{}'); } catch(e) {}
      divCount++;
      for (let i = 0; i < 50; i++) {
        const rid = (d['res204_id_'+i]||'').toUpperCase();
        if (!rid) { if (i > 7) break; continue; }
        // Categorize by resource type prefix
        const type = (d['res204_type_'+i]||rid.replace('+','')).toUpperCase().slice(0,4);
        typeCounts[type] = (typeCounts[type]||0) + 1;
        if (['HELO','AIRT'].some(t => type.startsWith(t))) totalAir++;
        else if (['IC','OSC','PSC','LSC','FSC','DIVS','RESL','SITL','DOCL'].some(t => type.startsWith(t))) totalOverhead++;
        else totalField++;
      }
    });

    // Standard IAP distribution:
    // - 1 per field resource (Division/Group Supervisors)
    // - 1 per overhead position
    // - 1 per air resource
    // - 5 extras for ICP/command post
    // - 10% overage for errors
    const base = divCount + totalOverhead + totalAir + 5;
    const recommended = Math.ceil(base * 1.1);
    const minimum = divCount + 3;

    const typeList = Object.entries(typeCounts)
      .sort((a,b) => b[1]-a[1])
      .map(([t,n]) => `<tr><td style="padding:3px 8px">${t}</td><td style="padding:3px 8px;text-align:center">${n}</td></tr>`)
      .join('');

    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center';
    modal.innerHTML = `
      <div style="background:var(--panel);border:1px solid var(--amber);border-radius:10px;
                  padding:22px;width:460px;max-width:95vw;max-height:80vh;overflow-y:auto">
        <div style="font-family:var(--font-hd);font-size:14px;color:var(--amber);
                    letter-spacing:1px;margin-bottom:14px">
          📄 IAP PRINT COUNT ESTIMATOR — Period ${PERIOD}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
          <div style="background:var(--panel2);border-radius:6px;padding:10px;text-align:center">
            <div style="font-family:var(--font-hd);font-size:28px;color:var(--amber)">${recommended}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Recommended</div>
            <div style="font-size:9px;color:var(--dim)">includes 10% buffer</div>
          </div>
          <div style="background:var(--panel2);border-radius:6px;padding:10px;text-align:center">
            <div style="font-family:var(--font-hd);font-size:28px;color:var(--blue)">${minimum}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Minimum</div>
            <div style="font-size:9px;color:var(--dim)">bare minimum</div>
          </div>
          <div style="background:var(--panel2);border-radius:6px;padding:10px;text-align:center">
            <div style="font-family:var(--font-hd);font-size:28px;color:var(--green)">${divCount}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Divisions</div>
            <div style="font-size:9px;color:var(--dim)">ICS-204 forms</div>
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px">
          <thead><tr style="background:var(--panel2)">
            <th style="padding:5px 8px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Basis</th>
            <th style="padding:5px 8px;text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase">Count</th>
          </tr></thead>
          <tbody>
            <tr><td style="padding:3px 8px">Division/Group Supervisors</td><td style="padding:3px 8px;text-align:center">${divCount}</td></tr>
            <tr><td style="padding:3px 8px">Overhead positions</td><td style="padding:3px 8px;text-align:center">${totalOverhead}</td></tr>
            <tr><td style="padding:3px 8px">Air resources</td><td style="padding:3px 8px;text-align:center">${totalAir}</td></tr>
            <tr><td style="padding:3px 8px">ICP / Command Post copies</td><td style="padding:3px 8px;text-align:center">5</td></tr>
            <tr style="border-top:1px solid var(--line)"><td style="padding:3px 8px;font-weight:bold">Subtotal</td><td style="padding:3px 8px;text-align:center;font-weight:bold">${base}</td></tr>
          </tbody>
        </table>
        ${typeList ? `
        <details style="margin-bottom:12px">
          <summary style="font-size:11px;color:var(--muted);cursor:pointer">Resource types on 204s (${Object.keys(typeCounts).length} types)</summary>
          <table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:6px">
            <thead><tr style="background:var(--panel2)">
              <th style="padding:4px 8px;text-align:left">Type</th>
              <th style="padding:4px 8px;text-align:center">Count</th>
            </tr></thead>
            <tbody>${typeList}</tbody>
          </table>
        </details>` : ''}
        <div style="display:flex;justify-content:flex-end">
          <button onclick="this.closest('[style*=fixed]').remove()"
            style="padding:7px 20px">Close</button>
        </div>
      </div>`;
    modal.onclick = e => { if (e.target === modal) modal.remove(); };
    document.body.appendChild(modal);
  } catch(e) {
    alert('Could not estimate print count: ' + e.message);
  }
}

// ── ITEM 11: Record 204 assignments to resource history ────────────
async function record204Assignments() {
  // Called after saving a 204 — logs assignments to resource_history table
  if (!INC_ID) return;
  const fd = collectFormData();
  const divGroup = fd.division_group || fd.branch || 'Unknown';
  const entries = [];
  for (let i = 0; i < res204Count; i++) {
    const rid = (fd['res204_id_'+i]||'').trim();
    if (!rid) continue;
    entries.push({
      resource_id:   rid,
      resource_name: fd['res204_leader_'+i]||'',
      resource_type: fd['res204_type_'+i]||'',
      assignment:    divGroup,
      incident_id:   INC_ID,
      period:        PERIOD,
      date:          new Date().toISOString().slice(0,10),
    });
  }
  if (!entries.length) return;
  try {
    await fetch(`${ICS_API}/api/ics/resource_history`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ entries })
    });
  } catch(e) { /* non-critical — ignore offline */ }
}

  try {

    if (!repeaters.length) {
      statusEl.textContent = 'No repeaters in database. Go to Repeaters page to add some.';

    statusEl.style.color = 'var(--red)';

function selectAllRepeaters(count) {
  for (let i=0; i<count; i++) {
    const chk = document.getElementById(`repchk_${i}`);
    const modal = document.getElementById('repPickerModal');
    if (chk && modal && modal._repeaters) {
      // Auto-select ARES repeaters
      if (modal._repeaters[i]?.ares) chk.checked = true;
    }
  }
}

function importSelectedRepeaters(repeaters) {
  const tbody = document.getElementById('ch205Body');
  if (!tbody) return;

  let imported = 0;
  repeaters.forEach((rep, i) => {
    const chk = document.getElementById(`repchk_${i}`);
    if (!chk?.checked) return;

    // Find first empty row or add new row
    let rowIdx = ch205Count;
    for (let r=0; r<ch205Count; r++) {
      const rxEl = document.querySelector(`[data-key="ch205_rx_${r}"]`);
      if (rxEl && !rxEl.value) { rowIdx = r; break; }
    }

    if (rowIdx === ch205Count) {
      // Need new row
      const tr = document.createElement('tr');
      const tmp = document.createElement('tbody');
      tmp.innerHTML = FORMS['205']._chRow(ch205Count);
      tbody.appendChild(tmp.firstChild);
      rowIdx = ch205Count++;
    }

    // Fill in the row
    const setField = (key, val) => {
      const el = document.querySelector(`[data-key="${key}"]`);
      if (el) el.value = val;
    };
    setField(`ch205_zone_${rowIdx}`, `${imported+1}`);
    setField(`ch205_name_${rowIdx}`, `${rep.callsign||''} ${rep.city?'('+rep.city+')':''}`);
    setField(`ch205_rx_${rowIdx}`, rep.output_freq||'');
    setField(`ch205_tx_${rowIdx}`, rep.input_freq||'');
    setField(`ch205_mode_${rowIdx}`, rep.mode||'FM');
    setField(`ch205_pl_${rowIdx}`, rep.tone||'');
    setField(`ch205_remarks_${rowIdx}`, rep.sponsor||rep.use_type||'');
    // Set assignment dropdown
    const assignEl = document.querySelector(`[data-key="ch205_assign_${rowIdx}"]`);
    if (assignEl) assignEl.value = rep.ares ? 'All' : 'Tactical';
    imported++;
  });

  document.getElementById('repPickerModal')?.remove();
  const statusEl = document.getElementById('repeaterImportStatus');
  if (statusEl) {
    statusEl.textContent = `✓ Imported ${imported} repeater${imported!==1?'s':''} into the channel plan.`;
    statusEl.style.display = 'block';
    statusEl.style.color = 'var(--green)';
  }
}

function add205ARow() {

async function importFrom203() {
  // Pull assignment data and populate 205A
  if (!INC_ID) { alert('Open this form from an incident to import assignments.'); return; }
  try {
    const r = await fetch(`${ICS_API}/api/ics/assignments?incident_id=${INC_ID}`);
    const data = await r.json();
    const all = [...(data.assignments||[]), ...(data.roster_roles||[])];
    let idx = 0;
    all.forEach(a => {
      if (idx >= cl205aCount) add205ARow();
      const set = (key,val) => { const el=document.querySelector(`[data-key="${key}"]`); if(el) el.value=val; };
      const name = a.name || a.callsign || '';
      const pos  = a.ics_position || a.role || '';
      if (!name && !pos) return;
      set(`cl205a_name_${idx}`, name);
      set(`cl205a_pos_${idx}`, pos);
      set(`cl205a_email_${idx}`, a.callsign ? `${a.callsign}@winlink.org` : '');
      idx++;
    });
    const statusDiv = document.querySelector('.section-card h2 + p');
    if (statusDiv) statusDiv.style.color = 'var(--green)';
  } catch(e) { alert('Import failed: ' + e); }
}

function filterCL(q) {

  for (let i = 0; i < ch205Count; i++) {
    const name = fd['ch205_name_'+i]||'';
    const rx   = fd['ch205_rx_'+i]||'';
    if (!name && !rx) continue;
    rows.push({ i, name, rx, div: fd['ch205_division_'+i]||'' });
  }
  if (!rows.length) { alert('No channels on ICS-205 yet. Add channels first.'); return; }

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--blue);border-radius:10px;
                padding:20px;width:500px;max-width:96vw;max-height:80vh;overflow-y:auto">
      <div style="font-family:var(--font-hd);font-size:13px;color:var(--blue);
                  letter-spacing:1px;margin-bottom:4px">🔗 LINK CHANNELS TO DIVISIONS</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px">
        Assign each channel to a Division or Group. When a 204 is built for that division,
        the channel will auto-populate into the communications section.
      </div>
      ${rows.map(r => `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;
                    padding:7px 10px;background:var(--panel2);border-radius:5px">
          <div style="flex:1;font-size:12px">
            <strong>${r.name}</strong>
            <span style="font-size:10px;color:var(--muted);margin-left:6px">${r.rx} MHz</span>
          </div>
          <input type="text" id="divlink_${r.i}" value="${r.div}"
            placeholder="Div A / Grp SAR / All"
            style="width:130px;background:var(--input-bg);border:1px solid var(--line);
                   color:var(--txt);padding:5px 8px;font-size:12px;border-radius:3px">
        </div>`).join('')}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button onclick="saveDivLinks()" 
          style="background:var(--blue);border-color:var(--blue);color:#fff;padding:7px 18px">
          Save Links
        </button>
        <button onclick="this.closest('[style*=fixed]').remove()" style="padding:7px 16px">Cancel</button>
      </div>
    </div>`;
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);
  window._divLinkRows = rows;
}

function saveDivLinks() {
  if (!window._divLinkRows) return;
  window._divLinkRows.forEach(r => {
    const el = document.getElementById('divlink_'+r.i);
    if (el) {
      formData['ch205_division_'+r.i] = el.value;
      // Also update the input in the table
      const inp = document.querySelector(`[data-key="ch205_division_${r.i}"]`);
      if (inp) inp.value = el.value;
    }
  });
  markDirty();
  document.querySelector('[style*="position:fixed"][style*="z-index:500"]')?.remove();
  alert(`✓ Division links saved. When creating ICS-204s for each division, the assigned channel will auto-populate.`);
}

// Hospital database picker for ICS-206
async function showHospitalPicker() {
  try {
    const r = await fetch(`${MAIN_API}/api/hospitals`);
    const hospitals = await r.json();
    if (!hospitals.length) {
      alert('No hospitals in database.\nOpen the Hospital Database page to add hospitals for your deployment area.');
      return;
    }
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center';
    const rowsHtml = hospitals.map((h,i) => {
      const caps = [h.burn_center?'Burn':'',h.helipad?'Heli':'',h.icu?'ICU':''].filter(Boolean).join(' ');
      return `<tr style="border-bottom:1px solid var(--line)">
        <td style="padding:5px 8px"><input type="checkbox" id="hpchk_${i}" ${i<4?'checked':''}></td>
        <td style="padding:5px 8px"><strong>${h.name}</strong></td>
        <td style="padding:5px 8px">${h.city||''}, ${h.state||''}</td>
        <td style="padding:5px 8px">${h.county||''}</td>
        <td style="padding:5px 8px">${h.phone||''}</td>
        <td style="padding:5px 8px;text-align:center">${h.travel_time_min?h.travel_time_min+' min':'—'}</td>
        <td style="padding:5px 8px;text-align:center">${h.trauma_level||'—'}</td>
        <td style="padding:5px 8px;font-size:10px">${caps}</td>
      </tr>`;
    }).join('');
    overlay.innerHTML = `
      <div style="background:var(--panel);border:1px solid var(--red);border-radius:10px;
                  padding:20px;width:720px;max-width:96vw;max-height:80vh;display:flex;flex-direction:column">
        <div style="font-family:var(--font-hd);font-size:14px;color:var(--amber);margin-bottom:8px;letter-spacing:1px">
          🏥 SELECT HOSPITALS FOR ICS-206 MEDICAL PLAN
        </div>
        <p style="font-size:11px;color:var(--muted);margin:0 0 10px">
          First 4 pre-selected. Check any hospitals to include.
          <a href="hospitals.html" target="_blank" style="color:var(--blue);margin-left:8px">Add hospitals →</a>
        </p>
        <div style="overflow-y:auto;flex:1;border:1px solid var(--line);border-radius:6px">
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead style="position:sticky;top:0;background:var(--panel2)">
              <tr>
                <th style="padding:5px 8px">✓</th>
                <th style="padding:5px 8px;text-align:left">Hospital Name</th>
                <th style="padding:5px 8px">City, State</th>
                <th style="padding:5px 8px">County</th>
                <th style="padding:5px 8px;text-align:left">Phone</th>
                <th style="padding:5px 8px">Travel</th>
                <th style="padding:5px 8px">Trauma</th>
                <th style="padding:5px 8px">Caps</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button id="hospImportBtn"
            style="background:var(--red);border-color:var(--red);color:#fff;font-weight:bold;padding:7px 20px">
            Import Selected into ICS-206
          </button>
          <button id="hospCancelBtn" style="background:var(--panel2)">Cancel</button>
          <span style="font-size:11px;color:var(--muted);margin-left:auto">
            ${hospitals.length} hospital${hospitals.length!==1?'s':''} in database
          </span>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('hospCancelBtn').onclick = () => overlay.remove();
    document.getElementById('hospImportBtn').onclick = () => {
      let imported = 0;
      hospitals.forEach((h, i) => {
        const chk = document.getElementById('hpchk_'+i);
        if (!chk?.checked) return;
        const set = (key,val) => {
          const el = document.querySelector('[data-key="'+key+'"]');
          if (el) el.value = val;
        };
        const setC = (key,val) => {
          const el = document.querySelector('[data-key="'+key+'"]');
          if (el) el.checked = !!val;
        };
        set('hosp_name_'+imported, h.name||'');
        set('hosp_addr_'+imported, [h.address,h.city,h.state].filter(Boolean).join(', '));
        set('hosp_time_'+imported, h.travel_time_min?h.travel_time_min+' min':'');
        set('hosp_phone_'+imported, h.phone||'');
        setC('hosp_trauma_'+imported, h.trauma_level);
        setC('hosp_burn_'+imported, h.burn_center);
        setC('hosp_helo_'+imported, h.helipad);
        imported++;
      });
      overlay.remove();
    };
  } catch(e) {
    alert('Could not load hospital database: ' + e);
  }

function add208Hazard() {
  const el = document.getElementById('hazardList');

let rr213Count = 6;
function addRR213Row() {
  const tbody = document.getElementById('rr213Body');
  if (!tbody) return;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="border:1px solid var(--line);padding:3px"><input type="number" data-key="rr_qty_${rr213Count}" style="width:50px;font-size:11px;padding:3px 4px;text-align:center"></td>
    <td style="border:1px solid var(--line);padding:3px"><input type="text" data-key="rr_type_${rr213Count}" style="width:100%;font-size:11px;padding:3px 4px"></td>
    <td style="border:1px solid var(--line);padding:3px"><select data-key="rr_cat_${rr213Count}" style="width:100%;font-size:11px;padding:3px 4px;background:var(--input-bg);color:var(--txt);border:none"><option></option><option>Personnel</option><option>Equipment</option><option>Supply</option><option>Vehicle</option><option>Aircraft</option><option>Facility</option><option>Other</option></select></td>
    <td style="border:1px solid var(--line);padding:3px"><input type="text" data-key="rr_needed_${rr213Count}" style="width:100%;font-size:11px;padding:3px 4px"></td>
    <td style="border:1px solid var(--line);padding:3px"><input type="text" data-key="rr_loc_${rr213Count}" style="width:100%;font-size:11px;padding:3px 4px"></td>
    <td style="border:1px solid var(--line);padding:3px"><input type="text" data-key="rr_source_${rr213Count}" style="width:100%;font-size:11px;padding:3px 4px"></td>`;
  tbody.appendChild(tr);
  rr213Count++;
}

async function add213RRFromNIMS() {
  await showResourceTypePicker(t => {
    const typeStr = t.type_level ? `${t.kind} – ${t.type_level}` : t.kind;
    // Find next empty row
    let idx = 0;
    while (document.querySelector(`[data-key="rr_type_${idx}"]`)?.value) idx++;
    const set = (key,val) => { const el=document.querySelector(`[data-key="${key}"]`); if(el) el.value=val; };
    set(`rr_type_${idx}`, typeStr);
    set(`rr_cat_${idx}`, t.category||'');
    if (t.min_personnel) set(`rr_qty_${idx}`, t.min_personnel);
  });
}

async function add215FromNIMS() {
  await showResourceTypePicker(t => {
    const typeStr = t.type_level ? `${t.kind} – ${t.type_level}` : t.kind;
    // Find next row with empty equipment field
    let idx = 0;
    while (document.querySelector(`[data-key="ops215_equip_${idx}"]`)?.value && idx < ops215Count) idx++;
    const el = document.querySelector(`[data-key="ops215_equip_${idx}"]`);
    if (el) el.value = typeStr;
    if (t.min_personnel) {
      const pEl = document.querySelector(`[data-key="ops215_pers_${idx}"]`);
      if (pEl) pEl.value = t.min_personnel;
    }
  });
}

async function apply210ToTCards() {
  if (!INC_ID) { alert('Open this form from an incident to apply changes to the T-card board.'); return; }
  const fd = collectFormData();
  let applied = 0;
  const statusEl = document.getElementById('sc210Status');
  for (let i=0; i<sc210Count; i++) {
    const name = fd[`sc210_name_${i}`];
    const newStatus = fd[`sc210_new_${i}`];
    if (!name || !newStatus) continue;
    try {
      // Find existing T-card by name
      const r = await fetch(`${ICS_API}/api/ics/tcards?incident_id=${INC_ID}`);
      const cards = await r.json();
      const existing = cards.find(c => c.resource_name.toLowerCase() === name.toLowerCase());
      const payload = {
        id: existing?.id || undefined,
        incident_id: INC_ID,
        resource_name: name,
        resource_type: fd[`sc210_type_${i}`]||'',
        status: newStatus,
        assignment: fd[`sc210_assign_${i}`]||existing?.assignment||'',
        contact: fd[`sc210_contact_${i}`]||existing?.contact||'',
      };
      if (!payload.id) delete payload.id;
      await fetch(`${ICS_API}/api/ics/tcards`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      applied++;
    } catch(e) {}
  }
  statusEl.textContent = `\u2713 Applied ${applied} status change${applied!==1?'s':''} to T-card board.`;
  statusEl.style.display = 'block';
}

async function sync211FromNetLogger() {
  if (!INC_ID) { alert('Open from an incident to import check-ins.'); return; }
  try {
    const r = await fetch(`${ICS_API}/api/ics/assignments?incident_id=${INC_ID}`);
    const data = await r.json();
    const all = [...(data.assignments||[])];
    let idx = 0;
    all.forEach(a => {
      if (idx >= ci211Count) add211Row();
      const set = (key,val) => { const el=document.querySelector(`[data-key="${key}"]`); if(el) el.value=val; };
      set(`ci211_name_${idx}`, a.name||a.callsign||'');
      set(`ci211_id_${idx}`, a.callsign||'');
      set(`ci211_pos_${idx}`, a.ics_position||'');
      set(`ci211_in_${idx}`, a.timestamp?a.timestamp.slice(0,16):'');
      set(`ci211_out_${idx}`, a.checkout_time?a.checkout_time.slice(0,16):'');
      idx++;
    });
    const st = document.getElementById('ci211ImportStatus');
    st.textContent = `\u2713 Imported ${idx} check-in${idx!==1?'s':''} from net logger.`;
    st.style.display = 'block';
  } catch(e) { alert('Import failed: '+e); }
}

async function push211ToTCards() {
  if (!INC_ID) { alert('Open from an incident to push to T-card board.'); return; }
  const fd = collectFormData();
  let pushed = 0;
  for (let i=0; i<ci211Count; i++) {
    const name = fd[`ci211_name_${i}`];
    if (!name) continue;
    try {
      await fetch(`${ICS_API}/api/ics/tcards`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          incident_id: INC_ID,
          resource_name: name,
          resource_type: fd[`ci211_rtype_${i}`]||'Personnel',
          status: fd[`ci211_out_${i}`]?'Out of Service':'Available',
          assignment: fd[`ci211_pos_${i}`]||'',
          home_agency: fd[`ci211_agency_${i}`]||'',
          contact: fd[`ci211_id_${i}`]||'',
        })
      });
      pushed++;
    } catch(e) {}
  }
  const st = document.getElementById('ci211ImportStatus');
  st.textContent = `\u2713 Pushed ${pushed} resource${pushed!==1?'s':''} to T-card board.`;
  st.style.display = 'block';
}

let allTCards = [];
const TC_STATUS_COLORS = {
  'Available':    {bg:'rgba(26,122,58,0.15)',  border:'var(--green)',  dot:'var(--green)'},
  'Assigned':     {bg:'rgba(26,58,107,0.15)',  border:'var(--blue)',   dot:'var(--blue)'},
  'Out of Service':{bg:'rgba(192,32,32,0.1)',  border:'var(--red)',    dot:'var(--red)'},
  'Staging':      {bg:'rgba(200,118,10,0.1)',  border:'var(--amber)',  dot:'var(--amber)'},
  'En Route':     {bg:'rgba(155,89,182,0.1)',  border:'#9b59b6',      dot:'#9b59b6'},
};

async function addTCardFromNIMS() {
  if (!INC_ID) { alert('Open from an incident to add resources.'); return; }
  await showResourceTypePicker(async t => {
    const typeStr = t.type_level ? `${t.kind} – ${t.type_level}` : t.kind;
    // Pre-fill the add modal with NIMS type data
    document.getElementById('tc_name').value = typeStr;
    document.getElementById('tc_rtype').value = t.kind;
    document.getElementById('tc_category').value = t.category||'';
    document.getElementById('tc_type').value = t.type_level||'';
    if (t.min_personnel) document.getElementById('tc_personnel').value = t.min_personnel;
    document.getElementById('tc_status').value = 'Available';
    document.getElementById('addTCardModal').style.display = 'flex';
    document.getElementById('tc_name').focus();
  });
}

async function loadTCards219() {
  if (!INC_ID) return;
  try {
    const r = await fetch(`${ICS_API}/api/ics/tcards?incident_id=${INC_ID}`);
    allTCards = await r.json();
    renderTCards219(allTCards);
  } catch(e) {
    const board = document.getElementById('tc219Board');
    if (board) board.innerHTML = '<div style="color:var(--red);padding:20px;grid-column:1/-1">\u26a0 T-card board unavailable \u2014 ICS platform offline</div>';
  }
}

function filterTCards219() {
  const statusF = document.getElementById('tc219Filter')?.value;
  const catF = document.getElementById('tc219CatFilter')?.value;
  let filtered = allTCards;
  if (statusF) filtered = filtered.filter(c => c.status === statusF);
  if (catF) filtered = filtered.filter(c => c.category === catF || c.resource_type === catF);
  renderTCards219(filtered);
}

function renderTCards219(cards) {
  const board = document.getElementById('tc219Board');
  const summary = document.getElementById('tc219Summary');
  const countEl = document.getElementById('tc219Count');
  if (!board) return;

  // Summary
  const statuses = ['Available','Assigned','Out of Service','Staging','En Route'];
  if (summary) {
    summary.innerHTML = statuses.map(s => {
      const n = allTCards.filter(c=>c.status===s).length;
      const col = TC_STATUS_COLORS[s] || {bg:'var(--panel)',border:'var(--line)',dot:'var(--dim)'};
      return `<div style="background:${col.bg};border:1px solid ${col.border};border-radius:6px;
                          padding:8px;text-align:center">
        <div style="font-size:20px;font-weight:bold;color:${col.dot}">${n}</div>
        <div style="font-size:10px;color:var(--muted)">${s}</div>
      </div>`;
    }).join('');
  }

  if (countEl) countEl.textContent = `${cards.length} resource${cards.length!==1?'s':''} shown`;

  if (!cards.length) {
    board.innerHTML = `<div style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1">
      <div style="font-size:32px;margin-bottom:8px">📋</div>
      <div style="font-size:14px">No resources on board</div>
      <button onclick="showAddTCard()" style="margin-top:10px;background:var(--eoc);border-color:var(--eoc);color:#fff">+ Add First Resource</button>
    </div>`;
    return;
  }

  board.innerHTML = cards.map(c => {
    const col = TC_STATUS_COLORS[c.status] || {bg:'var(--panel)',border:'var(--line)',dot:'var(--dim)'};
    return `<div style="background:${col.bg};border:2px solid ${col.border};border-radius:8px;padding:12px;position:relative">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="font-family:var(--font-hd);font-size:14px">${c.resource_name}</div>
        <span style="font-size:9px;padding:2px 7px;border-radius:8px;background:${col.border};
                     color:#fff;white-space:nowrap">${c.status}</span>
      </div>
      ${c.resource_type?`<div style="font-size:11px;color:var(--muted)">${c.resource_type}${c.type?' \u00b7 '+c.type:''}</div>`:''}
      ${c.leader?`<div style="font-size:11px;margin-top:3px">\ud83d\udc64 ${c.leader}</div>`:''}
      ${c.num_personnel?`<div style="font-size:11px;color:var(--muted)">\ud83d\udc65 ${c.num_personnel} personnel</div>`:''}
      ${c.assignment?`<div style="font-size:11px;margin-top:3px">\ud83d\udccc ${c.assignment}</div>`:''}
      ${c.contact?`<div style="font-size:11px;color:var(--muted)">\ud83d\udcde ${c.contact}</div>`:''}
      ${c.eta?`<div style="font-size:11px;color:#9b59b6">ETA: ${c.eta}</div>`:''}
      ${c.home_agency?`<div style="font-size:10px;color:var(--dim)">${c.home_agency}</div>`:''}
      <div style="display:flex;gap:4px;margin-top:8px">
        <select onchange="quickStatusChange('${c.id}',this.value)"
          style="flex:1;font-size:11px;padding:3px 5px;background:var(--input-bg);
                 border:1px solid var(--line);color:var(--txt);border-radius:3px">
          ${['Available','Assigned','Out of Service','Staging','En Route'].map(s=>
            `<option ${s===c.status?'selected':''}>${s}</option>`).join('')}
        </select>
        <button onclick="showEditTCard('${c.id}')"
          style="font-size:10px;padding:3px 6px;background:var(--panel2)">✏</button>
        <button onclick="deleteTCard219('${c.id}')"
          style="font-size:10px;padding:3px 6px;background:var(--panel2);color:var(--red)">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function quickStatusChange(id, newStatus) {
  const card = allTCards.find(c=>c.id===id);
  if (!card) return;
  await fetch(`${ICS_API}/api/ics/tcards`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({...card, status:newStatus, incident_id:INC_ID})
  });
  await loadTCards219();
}

function showAddTCard() {
  document.getElementById('tc_edit_id').value = '';
  ['tc_name','tc_rtype','tc_category','tc_type','tc_leader','tc_personnel',
   'tc_assignment','tc_contact','tc_eta','tc_home_agency','tc_order_number','tc_notes'
  ].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('tc_status').value = 'Available';
  document.getElementById('addTCardModal').style.display = 'flex';
  document.getElementById('tc_name').focus();
}

function showEditTCard(id) {
  const card = allTCards.find(c=>c.id===id);
  if (!card) return;
  document.getElementById('tc_edit_id').value = card.id;
  const set = (eid,val) => { const el=document.getElementById(eid); if(el) el.value=val||''; };
  set('tc_name', card.resource_name);
  set('tc_rtype', card.resource_type);
  set('tc_category', card.category);
  set('tc_type', card.type);
  set('tc_leader', card.leader);
  set('tc_personnel', card.num_personnel);
  set('tc_assignment', card.assignment);
  set('tc_contact', card.contact);
  set('tc_eta', card.eta);
  set('tc_home_agency', card.home_agency);
  set('tc_order_number', card.order_number);
  set('tc_notes', card.notes);
  document.getElementById('tc_status').value = card.status || 'Available';
  document.getElementById('addTCardModal').style.display = 'flex';
}

async function saveTCard219() {
  const name = document.getElementById('tc_name').value.trim();
  if (!name) { alert('Resource name is required'); return; }
  const editId = document.getElementById('tc_edit_id').value;
  const payload = {
    id: editId || undefined,
    incident_id: INC_ID,
    resource_name: name,
    resource_type: document.getElementById('tc_rtype').value.trim(),
    category: document.getElementById('tc_category').value.trim(),
    type: document.getElementById('tc_type').value.trim(),
    leader: document.getElementById('tc_leader').value.trim(),
    num_personnel: parseInt(document.getElementById('tc_personnel').value)||0,
    status: document.getElementById('tc_status').value,
    assignment: document.getElementById('tc_assignment').value.trim(),
    contact: document.getElementById('tc_contact').value.trim(),
    eta: document.getElementById('tc_eta').value.trim(),
    home_agency: document.getElementById('tc_home_agency').value.trim(),
    order_number: document.getElementById('tc_order_number').value.trim(),
    notes: document.getElementById('tc_notes').value.trim(),
  };
  if (!payload.id) delete payload.id;
  await fetch(`${ICS_API}/api/ics/tcards`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  document.getElementById('addTCardModal').style.display = 'none';
  await loadTCards219();
}

async function deleteTCard219(id) {
  if (!confirm('Remove this resource from the T-card board?')) return;
  await fetch(`${ICS_API}/api/ics/tcards/${id}`, {method:'DELETE'});
  await loadTCards219();
}

async function add218FromNIMS() {
  await showResourceTypePicker(t => {
    const typeStr = t.type_level ? `${t.kind} – ${t.type_level}` : t.kind;
    // Find next empty row
    let idx = 0;
    while (document.querySelector(`[data-key="inv218_desc_${idx}"]`)?.value && idx < inv218Count) idx++;
    const set = (key,val) => { const el=document.querySelector(`[data-key="${key}"]`); if(el) el.value=val; };
    set(`inv218_desc_${idx}`, typeStr);
    set(`inv218_cat_${idx}`, t.category||'');
  });
}

let cr217aCount = 12;

async function load217AFromRepeaters() {
  try {
    const r = await fetch(`${MAIN_API}/api/repeaters`);
    const reps = await r.json();
    let idx = 0;
    reps.forEach(rep => {
      if (idx >= cr217aCount) return;
      const set = (key,val) => { const el=document.querySelector(`[data-key="${key}"]`); if(el) el.value=val; };
      set(`cr217a_freq_${idx}`, rep.output_freq||'');
      set(`cr217a_name_${idx}`, `${rep.callsign||''} ${rep.city?'('+rep.city+')':''}`);
      set(`cr217a_mode_${idx}`, rep.mode||'FM');
      set(`cr217a_pl_${idx}`, rep.tone||'');
      set(`cr217a_cov_${idx}`, rep.county||rep.city||'');
      set(`cr217a_restrict_${idx}`, rep.use_type||'Open');
      idx++;
    });
  } catch(e) { alert('Could not load repeaters: '+e); }
}

// Standalone print function — opens a proper print window
function print225Standalone() {
  const fd = collectFormData();
  Object.assign(formData, fd);

}
